<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programme Semaine — Dos & Forme</title>
<!-- ═══ STYLES ═══ -->
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Variables globales (couleurs, espacements) ── */
:root{
  --bg:#F4F2ED;
  --surface:#FFFFFF;
  --surface2:#EDEAE3;
  --surface3:#E5E2DA;
  --border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.13);
  --text:#1C1A16;
  --muted:#7A776F;
  --muted2:#AAA79F;
  --bureau:#C05A20;
  --bureau-bg:#FDF1EA;
  --tele:#2E6E4E;
  --tele-bg:#E8F4EE;
  --weekend:#4A4FA8;
  --weekend-bg:#EEEFFE;
  --velo:#B8890A;
  --velo-bg:#FDF5E0;
  --gold:#C9971A;
  --green:#2E7D52;
  --red:#B84040;
  --radius:14px;
  --radius-sm:8px;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}

/* ── TOP NAV ── */
.topbar{background:var(--text);color:#F4F2ED;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.topbar-sub{font-size:11px;opacity:.55;font-family:'DM Mono',monospace;margin-top:2px}
.week-selector{display:flex;align-items:center;gap:10px}
.week-btn{background:rgba(255,255,255,0.12);border:none;color:#F4F2ED;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;transition:background .15s}
.week-btn:hover{background:rgba(255,255,255,0.22)}
.week-label{font-family:'DM Mono',monospace;font-size:12px;opacity:.8;min-width:90px;text-align:center}

/* ── DAY TABS ── */
.day-tabs{display:flex;gap:0;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border2);padding:0 1rem;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:.9rem 1.1rem .75rem;cursor:pointer;border-bottom:3px solid transparent;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap;position:relative}
.day-tab:hover{color:var(--text)}
.day-tab.active{color:var(--text);border-bottom-color:var(--text)}
.day-tab .day-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:10px;right:8px}
.day-tab .done-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);display:block;margin-top:1px;text-align:center}

/* ── DAY PANEL ── */
.day-panels{padding:1.25rem 1.25rem 4rem}
.day-panel{display:none}
.day-panel.active{display:block}

/* ── DAY HEADER ── */
.day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.day-title-block{}
.day-name{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.day-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
.badge-bureau{background:var(--bureau-bg);color:var(--bureau)}
.badge-tele{background:var(--tele-bg);color:var(--tele)}
.badge-weekend{background:var(--weekend-bg);color:var(--weekend)}

/* Stats journée */
.day-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem .9rem;text-align:center;min-width:72px}
.stat-val{font-size:17px;font-weight:600;letter-spacing:-0.3px;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}

/* ── SESSION CARD ── */
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem}
.session-head{padding:1rem 1.25rem .75rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.session-emoji{font-size:22px;flex-shrink:0}
.session-info{flex:1}
.session-title{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.session-meta{font-size:12px;color:var(--muted);margin-top:2px;font-weight:300}
.session-duration{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);flex-shrink:0}
.session-done-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:#E8F5EE;color:#2E7D52;display:none}
.session-done-badge.visible{display:inline-block}

/* ── EXERCISE ROW ── */
.ex-list{padding:.5rem 0}
.ex-row{display:flex;align-items:flex-start;gap:10px;padding:.7rem 1.25rem;transition:background .1s;cursor:pointer}
.ex-row:hover{background:var(--surface2)}
.ex-row.checked{opacity:.55}
.ex-check{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface);cursor:pointer;padding:0;font-size:11px;color:white;font-family:inherit}
.ex-row.checked .ex-check{background:var(--green);border-color:var(--green);color:white;font-size:11px}
.ex-body{flex:1}
.ex-name{font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ex-info-link{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:4px;background:var(--surface2);color:var(--muted);text-decoration:none;font-size:10px;flex-shrink:0;transition:background .15s,color .15s;border:1px solid var(--border)}
.ex-info-link:hover{background:var(--text);color:#fff;border-color:var(--text)}
.ex-desc{font-size:11.5px;color:var(--muted);line-height:1.5;font-weight:300;margin-top:2px}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.ex-reps{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:5px;white-space:nowrap}
.type-dot{width:6px;height:6px;border-radius:50%;margin-top:6px}
.dot-gainage{background:#4A5FA8}
.dot-etirement{background:#2E6E4E}
.dot-cardio{background:#B84040}
.dot-velo{background:#B8890A}
.dot-muscu{background:#7A4FA8}
.dot-yoga{background:#C0607A}

/* Timer */
.timer-btn{border:1px solid var(--border2);background:none;border-radius:20px;padding:2px 9px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
.timer-btn:hover{border-color:var(--text);color:var(--text)}
.timer-btn.running{border-color:var(--red);color:var(--red)}

/* ── VELO CARD ── */
.velo-card{background:var(--velo-bg);border:1px solid rgba(184,137,10,.2);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;gap:14px;align-items:flex-start}
.velo-icon{font-size:28px}
.velo-info{flex:1}
.velo-title{font-size:14px;font-weight:600;color:var(--velo)}
.velo-sub{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.velo-stats{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.velo-stat{background:rgba(255,255,255,.6);border:1px solid rgba(184,137,10,.15);border-radius:8px;padding:.4rem .8rem;font-size:11px}
.velo-stat strong{font-family:'DM Mono',monospace;font-size:13px;display:block;color:var(--velo);line-height:1}
.velo-check-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.velo-check-label{font-size:12px;color:var(--muted)}
.velo-checkbox{width:18px;height:18px;border:1.5px solid rgba(184,137,10,.4);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:white;transition:all .15s;flex-shrink:0}
.velo-checkbox.checked{background:var(--velo);border-color:var(--velo);color:white;font-size:10px}

/* ── JOURNAL ── */
.journal-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-top:1rem}
.journal-title{font-size:13px;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.rating-row{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;flex-wrap:wrap}
.rating-lbl{font-size:12px;color:var(--muted);min-width:80px}
.star-btn{font-size:20px;cursor:pointer;opacity:.3;transition:all .15s;border:none;background:none;padding:0 1px;line-height:1}
.star-btn.active{opacity:1}
.feeling-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.feel-btn{border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;background:none;color:var(--muted);transition:all .15s;white-space:nowrap}
.feel-btn:hover{background:var(--surface2)}
.feel-btn.selected{background:var(--text);color:var(--bg);border-color:var(--text)}
.journal-textarea{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:.7rem .9rem;font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:72px;background:var(--bg);color:var(--text);outline:none;line-height:1.5}
.journal-textarea:focus{border-color:var(--text)}
.save-btn{margin-top:.6rem;width:100%;padding:.6rem;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.save-btn:hover{opacity:.85}
.save-confirm{font-size:11px;color:var(--green);font-family:'DM Mono',monospace;margin-top:4px;opacity:0;transition:opacity .3s}
.save-confirm.show{opacity:1}

/* ── PROGRESS OVERVIEW ── */
.overview-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;gap:12px;overflow-x:auto;scrollbar-width:none}
.overview-bar::-webkit-scrollbar{display:none}
.ov-day{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ov-ring{width:34px;height:34px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);transition:all .2s}
.ov-ring.partial{border-color:var(--gold);color:var(--gold)}
.ov-ring.full{border-color:var(--green);background:#E8F5EE;color:var(--green)}
.ov-ring.active-day{box-shadow:0 0 0 2px var(--text)}
.ov-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted2);text-transform:uppercase}

/* ── WEEKEND COMING SOON ── */
.soon-card{background:var(--weekend-bg);border:1px dashed rgba(74,79,168,.3);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;margin-bottom:1rem}
.soon-icon{font-size:36px;margin-bottom:.75rem}
.soon-title{font-size:15px;font-weight:600;color:var(--weekend);margin-bottom:.5rem}
.soon-sub{font-size:13px;color:var(--muted);line-height:1.6}
.equipment-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:1rem}
.eq-tag{background:white;border:1px solid rgba(74,79,168,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--weekend)}


/* ── Drive sync bar ── */
.sync-bar{display:flex;align-items:center;gap:10px;padding:.6rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
.sync-status{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--muted2)}
.sync-dot.connected{background:#2E7D52}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite alternate}
.sync-dot.error{background:var(--red)}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.sync-lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sync-btn{font-size:11px;padding:4px 12px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .15s;flex-shrink:0}
.sync-btn:hover{background:var(--surface2);color:var(--text)}
.sync-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.sync-btn.primary:hover{opacity:.85}


/* ── Series tracker (timers & reps) ── */
.series-tracker{padding:.5rem 1.25rem .75rem;border-top:1px solid var(--border);background:var(--surface)}
.series-row{display:flex;align-items:center;gap:8px;padding:.4rem 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.series-row:last-child{border-bottom:none}
.serie-check{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);transition:all .15s;font-size:10px}
.serie-check.done{background:var(--green);border-color:var(--green);color:white}
.serie-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;min-width:52px}
.serie-timer-btn{border:1px solid var(--border2);background:none;border-radius:16px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
.serie-timer-btn:hover{border-color:var(--text);color:var(--text)}
.serie-timer-btn.running{border-color:var(--red);color:var(--red)}
.serie-timer-btn.rest{border-color:var(--green);color:var(--green)}
.serie-timer-btn.rest.running{border-color:var(--green);color:var(--green);background:rgba(46,125,82,.08)}
.serie-phase{font-size:10px;color:var(--muted);font-style:italic;flex:1;text-align:right}
.serie-phase.active-phase{color:var(--tele)}

.serie-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);border-radius:6px;padding:5px 10px;white-space:normal;line-height:1.5;display:block;margin-bottom:.4rem}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.note-banner{background:#FDF5E0;border:1px solid rgba(184,137,10,.2);border-radius:10px;padding:.65rem 1rem;margin:.5rem 1.25rem .25rem;font-size:12px;color:#7A5800;line-height:1.5;font-style:italic}
.charge-tag{font-family:'DM Mono',monospace;font-size:10px;background:#F0EAFA;color:#6A35A8;border:1px solid rgba(106,53,168,.15);padding:2px 7px;border-radius:5px;white-space:nowrap}
.badge-yoga{background:#FAEAF0;color:#A03060}
.badge-muscu{background:#F0EAFA;color:#6A35A8}

/* ── Slider d'intensité par exercice ── */
.scale-badge{font-family:'DM Mono',monospace;font-size:10px;background:#EAF4F8;color:#2F6B85;border:1px solid rgba(47,107,133,.2);padding:2px 7px;border-radius:5px;white-space:nowrap}
.ex-scale-row{display:flex;align-items:center;gap:10px;padding:.5rem 1.25rem;border-top:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--muted)}
.ex-item.collapsed .ex-scale-row{display:none}
.ex-scale-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);flex-shrink:0}
.ex-scale-slider{flex:1;accent-color:var(--bureau);cursor:pointer}
.ex-scale-value{font-family:'DM Mono',monospace;min-width:42px;text-align:right;color:var(--text);font-size:11px}
.tm-scale{font-family:'DM Mono',monospace;font-size:11px;color:#2F6B85;background:#EAF4F8;padding:4px 10px;border-radius:20px}
body.admin-mode .ex-scale-row{display:none}

/* ── REPLI SESSIONS & EXERCICES ── */
.session-head{cursor:pointer;user-select:none}
.session-toggle{background:none;border:none;cursor:pointer;padding:0 0 0 6px;color:var(--muted);font-size:16px;line-height:1;flex-shrink:0;transition:transform .2s;display:flex;align-items:center}
.session-card.collapsed .session-toggle{transform:rotate(-90deg)}
.session-card.collapsed .ex-list,.session-card.collapsed .note-banner{display:none}
.ex-item{position:relative}
.ex-toggle{background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--muted2);font-size:15px;line-height:1;flex-shrink:0;transition:transform .2s;margin-top:1px;align-self:flex-start}
.ex-toggle:hover{color:var(--text)}
.ex-item.collapsed .series-tracker{display:none}
.ex-item.collapsed .ex-toggle{transform:rotate(-90deg)}

/* ── ADMIN MODE ── */
.admin-toggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#F4F2ED;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:14px;margin-left:10px;line-height:1}
.admin-toggle:hover{background:rgba(255,255,255,0.2)}
.admin-toggle.active{background:var(--gold);border-color:var(--gold);color:#1C1A16}
body.admin-mode .overview-bar,body.admin-mode .day-tabs,body.admin-mode .day-panels{display:none}
body:not(.admin-mode) .admin-container{display:none}
.admin-container{padding:.5rem 1.25rem 4rem}
.admin-banner{background:linear-gradient(90deg,#C9971A,#B88412);color:#fff;padding:10px 14px;border-radius:var(--radius-sm);margin:8px 0 14px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.admin-action-btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.admin-action-btn:hover{background:rgba(255,255,255,0.3)}
.admin-layout{display:grid;grid-template-columns:minmax(240px,360px) 1fr;gap:14px}
@media (max-width:820px){.admin-layout{grid-template-columns:1fr}}
.admin-tree{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px;max-height:72vh;overflow:auto}
.admin-node{padding:5px 6px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;line-height:1.4;user-select:none}
.admin-node:hover{background:var(--surface2)}
.admin-node.selected{background:var(--bureau-bg);border:1px solid var(--bureau)}
.admin-node-day{font-weight:600}
.admin-node-session{margin-left:14px}
.admin-node-exercise{margin-left:30px;color:var(--muted);font-size:12px}
.admin-node-caret{font-size:10px;color:var(--muted2);width:12px;flex-shrink:0;text-align:center}
.admin-node-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-node-add{margin-left:28px;color:var(--muted2);font-size:12px;padding:3px 6px;cursor:pointer;border-radius:4px;display:inline-block}
.admin-node-add:hover{background:var(--surface2);color:var(--text)}
.admin-type-badge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--surface3);color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.admin-editor{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.admin-editor h3{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.admin-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 20px}
.admin-field{margin-bottom:12px}
.admin-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;font-weight:500}
.admin-field input[type=text],.admin-field textarea,.admin-field select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;font:inherit;font-size:13px;background:#fff;color:var(--text)}
.admin-field textarea{min-height:56px;resize:vertical}
.admin-field input:focus,.admin-field textarea:focus,.admin-field select:focus{outline:none;border-color:var(--bureau)}
.admin-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.admin-field-checks{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.admin-field-checks label{display:inline-flex;align-items:center;gap:5px;font-size:12px;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer;margin:0}
.admin-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.admin-btn{padding:6px 12px;border:1px solid var(--border2);background:var(--surface);border-radius:6px;cursor:pointer;font-size:12px;color:var(--text)}
.admin-btn:hover{background:var(--surface2)}
.admin-btn.danger{color:var(--red);border-color:rgba(184,64,64,0.3)}
.admin-btn.danger:hover{background:#FBEDED}
.admin-btn-icon{padding:4px 10px;font-size:13px;line-height:1}
.admin-hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px}
.admin-banner-actions{display:flex;gap:6px;flex-wrap:wrap}
/* Reps builder */
.admin-builder{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px}
.admin-builder-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.admin-builder-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:500}
.admin-builder-modes{display:flex;gap:14px;margin-bottom:10px;font-size:13px}
.admin-builder-modes label{display:inline-flex;align-items:center;gap:5px;cursor:pointer;color:var(--text);text-transform:none;letter-spacing:0;margin:0}
.admin-builder-preview{margin-top:8px;padding:8px 10px;background:#fff;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.admin-builder-preview code{background:var(--surface2);padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;color:var(--text);font-size:11px}
.admin-builder-toggle{font-size:11px;color:var(--bureau);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
/* SubExos */
.admin-subexos{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:12px}
.admin-subexo-row{display:grid;grid-template-columns:1fr 70px auto;gap:6px;align-items:center;margin-bottom:6px}
.admin-subexo-row input{padding:5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:4px;background:#fff;font-family:inherit}
.admin-subexo-row .admin-btn-icon{padding:3px 7px;font-size:11px}
.admin-subexo-actions{display:flex;gap:3px}
/* Velo stats */
.admin-velo{background:var(--velo-bg);border:1px solid rgba(184,137,10,0.3);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px}

/* ── TIMER MODAL (mode utilisateur : countdown, pause, skip, reset) ── */
.timer-modal{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;animation:tmFadeIn .18s ease}
.timer-modal.hidden{display:none}
@keyframes tmFadeIn{from{opacity:0}to{opacity:1}}
.timer-modal-content{background:var(--surface);border-radius:20px;padding:1.75rem 1.5rem 1.5rem;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.45);text-align:center}
.tm-ex-name{font-size:18px;font-weight:600;letter-spacing:-0.3px;margin-bottom:4px;line-height:1.25}
.tm-ex-desc{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:14px;font-weight:300}
.tm-meta{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.tm-serie{font-size:12px;font-weight:500;color:var(--tele);background:var(--tele-bg);border-radius:20px;padding:4px 12px}
.tm-reps{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px}
.tm-phase{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px}
.tm-phase.prep{color:var(--bureau)}
.tm-phase.work{color:var(--tele)}
.tm-phase.rest{color:var(--green)}
.tm-time{font-family:'DM Mono',monospace;font-size:64px;font-weight:600;line-height:1.05;letter-spacing:-2px;color:var(--text);margin-bottom:20px;transition:color .2s,font-size .15s}
.tm-time.big{font-size:96px;color:var(--bureau)}
.tm-time.rest{color:var(--green)}
.tm-time.paused{opacity:.45}
.tm-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.tm-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12.5px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;flex:1;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.tm-btn:hover{background:var(--surface2)}
.tm-btn.tm-pause{background:var(--text);color:var(--bg);border-color:var(--text)}
.tm-btn.tm-pause:hover{opacity:.85}
.tm-btn.tm-skip{color:var(--tele);border-color:rgba(46,110,78,.35)}
.tm-btn.tm-skip:hover{background:var(--tele-bg)}
.tm-btn.tm-reset{color:var(--red);border-color:rgba(184,64,64,.35)}
.tm-btn.tm-reset:hover{background:#FBEDED}
body.admin-mode .timer-modal{display:none !important}

<!-- ── Topbar : titre + navigation semaine ── -->
<div class="topbar">

  </div>
</div>

<div class="sync-bar" id="sync-bar">

  </div>

</div>

<!-- ── Vue d'ensemble : rings de progression hebdo ── -->
<div class="overview-bar" id="overview-bar"></div>

<!-- ── Onglets jours (générés par renderTabs) ── -->
<div class="day-tabs" id="day-tabs"></div>

<!-- ── Panneaux jour (générés par renderAllPanels) ── -->
<div class="day-panels" id="day-panels"></div>

<!-- ── Modale timer plein écran (visible pendant chaque série en durée, masquée en mode admin) ── -->
<div class="timer-modal hidden" id="timer-modal" aria-hidden="true" role="dialog">
  <div class="timer-modal-content">
    <div class="tm-ex-name" id="tm-ex-name"></div>
    <div class="tm-ex-desc" id="tm-ex-desc"></div>
    <div class="tm-meta">

      <button type="button" class="tm-btn tm-reset" id="tm-reset" onclick="resetModalTimer()">⏹ Reset</button>
    </div>
  </div>
</div>

<!-- ── Mode admin : éditeur de configuration (affiché quand body.admin-mode est actif) ── -->
<div class="admin-container" id="admin-container">

    <span>⚠️ Mode édition — modifications sauvegardées automatiquement</span>

      <button class="admin-action-btn" onclick="document.getElementById('admin-import-input').click()" title="Charger une config depuis un fichier">⇧ Import</button>
      <input type="file" id="admin-import-input" accept="application/json,.json" style="display:none" onchange="adminImportConfig(event)">
      <button class="admin-action-btn" onclick="adminResetConfig()" title="Restaurer les sessions par défaut">↻ Reset</button>
      <button class="admin-action-btn" onclick="toggleAdminMode()">Quitter</button>
    </div>
  </div>
  <div class="admin-layout">
    <div class="admin-tree" id="admin-tree"></div>
    <div class="admin-editor" id="admin-editor">
      <div class="admin-empty">Sélectionne un jour, une session ou un exercice dans l'arbre pour l'éditer.</div>

  </div>
</div>

// ╔══════════════════════════════════════════════╗
// ║  CONFIG — Defaults + Live config utilisateur ║
// ╚══════════════════════════════════════════════╝
// DEFAULT_CONFIG : source de vérité figée (les DAYS/TYPE_*/SESSIONS ci-dessus).
//                  Sert de seed au premier lancement et cible du bouton Reset.
// LIVE_CONFIG    : config active lue par toutes les fonctions de rendu et par
//                  le mode admin. Initialisée à un clone de DEFAULT_CONFIG,
//                  remplacée par loadConfig() au boot si une config utilisateur
//                  est trouvée en localStorage, puis éventuellement écrasée par
//                  loadConfigFromDrive() si le fichier Drive est plus à jour.
// Persistance    : double — localStorage (clé CONFIG_STORAGE_KEY) + Google Drive
//                  (fichier fitness_programme_config.json, debounce 2 s).
// Validation     : isValidConfig() — toute config (locale, Drive, importée) doit
//                  passer cette garde avant d'écraser LIVE_CONFIG.

const DEFAULT_CONFIG = {
  version: 1,
  days: DAYS,
  typeLabels: TYPE_LABELS,
  typeColors: TYPE_COLORS,
  sessions: SESSIONS
};

const CONFIG_STORAGE_KEY = 'fitness_config';

function cloneDefaultConfig() {
  const now = new Date().toISOString();
  return {
    version: DEFAULT_CONFIG.version,
    meta: { createdAt: now, lastModified: now, source: 'default' },
    days: JSON.parse(JSON.stringify(DEFAULT_CONFIG.days)),
    typeLabels: JSON.parse(JSON.stringify(DEFAULT_CONFIG.typeLabels)),
    typeColors: JSON.parse(JSON.stringify(DEFAULT_CONFIG.typeColors)),
    sessions: JSON.parse(JSON.stringify(DEFAULT_CONFIG.sessions))
  };
}

let LIVE_CONFIG = cloneDefaultConfig();

function isValidConfig(c) {
  return c && c.version === 1
    && Array.isArray(c.days) && c.days.length === 7
    && c.typeLabels && c.typeColors && c.sessions
    && Array.isArray(c.sessions.bureau)
    && Array.isArray(c.sessions.tele)
    && c.sessions.weekend
    && Array.isArray(c.sessions.weekend.sam)
    && Array.isArray(c.sessions.weekend.dim);
}

function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (isValidConfig(parsed)) {
        LIVE_CONFIG = parsed;
        return;
      }
    }
  } catch {}
  LIVE_CONFIG = cloneDefaultConfig();
}

// ── Slider d'intensité par exercice (50–150 %) ──
// Donnée utilisateur globale (pas dans LIVE_CONFIG). Clé unique partagée entre
// toutes les semaines : un exercice gardé à 110 % l'est tant qu'on ne bouge pas
// le slider. Pushé sur Drive via le fichier progression (scheduleSave).
const SCALES_STORAGE_KEY = 'fitness_exercise_scales';
let EXERCISE_SCALES = {};

function loadScales() {
  try {
    const raw = localStorage.getItem(SCALES_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') return parsed;
    }
  } catch {}
  return {};
}

function getExerciseScale(exId) {
  const v = EXERCISE_SCALES[exId];
  return (typeof v === 'number' && v >= 50 && v <= 150) ? v : 100;
}

function saveScale(exId, pct) {
  const clamped = Math.max(50, Math.min(150, Math.round(pct / 5) * 5));
  if (clamped === 100) delete EXERCISE_SCALES[exId];
  else EXERCISE_SCALES[exId] = clamped;
  try { localStorage.setItem(SCALES_STORAGE_KEY, JSON.stringify(EXERCISE_SCALES)); } catch {}
  if (driveState.connected) {
    driveState.data[SCALES_STORAGE_KEY] = EXERCISE_SCALES;
    scheduleSave();
  }
  return clamped;
}

// ╔══════════════════════════════════════════════╗
// ║  STATE — Variables globales & helpers date   ║
// ╚══════════════════════════════════════════════╝
// currentWeekOffset : décalage en semaines par rapport à aujourd'hui (0 = semaine courante)
// activeDay         : id du jour affiché (ex: 'lun', 'mar'…)
// timers            : map legacy, réservée (aucun consommateur actif — conservée
//                     pour compatibilité si un onclick HTML ancien en fait encore usage)
// serieTimers       : map sid → { interval, remaining, phase:'prep'|'work'|'rest',
//                     paused, secPerSet, restSec, serieIdx, totalSets }.
//                     Voir startSerieTimer/tickSerieTimer pour le cycle de vie.
// adminState        : déclaré plus bas dans la section ADMIN MODE.
// modalState        : déclaré plus bas dans la section TIMER MODAL.
let currentWeekOffset = 0;
let activeDay = 'lun';
const timers = {};

function getWeekKey(offset=currentWeekOffset) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0?-6:1);
  const mon = new Date(d.setDate(diff));
  mon.setDate(mon.getDate() + offset*7);
  return `w${mon.getFullYear()}${String(mon.getMonth()+1).padStart(2,'0')}${String(mon.getDate()).padStart(2,'0')}`;
}

function getWeekDates(offset=currentWeekOffset) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0?-6:1);
  const mon = new Date(new Date().setDate(diff));
  mon.setDate(mon.getDate() + offset*7);
  const sun = new Date(mon); sun.setDate(sun.getDate()+6);
  const fmt = d => d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  return { label: fmt(mon)+' – '+fmt(sun), weekNum: getWeekNumber(mon), year: mon.getFullYear() };
}

function getWeekNumber(d) {
  const onejan = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
}

// ║  GOOGLE DRIVE — OAuth2 & persistance         ║
// ╚══════════════════════════════════════════════╝
// Flux : initGoogleAuth → tryRestoreToken → loadFromDrive (config puis progression).
// Fallback localStorage si non connecté ou hors ligne.
// Deux fichiers Drive, tous deux au scope drive.file (accès restreint aux seuls
// fichiers créés par l'app — pas de lecture du reste du Drive utilisateur) :
//   fitness_programme_semaine.json → progression (checks + journal par semaine),
//                                    écrite après chaque action utilisateur
//                                    (debounce 2 s via scheduleSave).
//   fitness_programme_config.json  → configuration (days, typeLabels, sessions…),
//                                    écrite à chaque édition admin / import / reset
//                                    (debounce 2 s via scheduleSaveConfig).

// ── Config & état Drive ──
// Client ID OAuth Google Cloud — si tu forkes le projet, remplace cette valeur par
// l'ID du projet Google Cloud que tu as créé (voir README §"Configuration Google Drive").
const GOOGLE_CLIENT_ID = '32795966086-3kt7ddob947h1bsahsmfom1qlmtkucea.apps.googleusercontent.com';
const DRIVE_FILENAME = 'fitness_programme_semaine.json';
const DRIVE_CONFIG_FILENAME = 'fitness_programme_config.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

let driveState = {
  connected: false, accessToken: null,
  fileId: null, configFileId: null,
  syncing: false, data: {}, saveTimer: null, configSaveTimer: null
};

// ── UI Sync ──
function setSyncUI(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  const btn = document.getElementById('sync-btn');
  dot.className = 'sync-dot' + (state ? ' '+state : '');
  if (lbl) lbl.textContent = label;
  if (state === 'connected') { btn.textContent = 'Synchronisé ✓'; btn.className = 'sync-btn'; }
  else if (state === 'syncing') { btn.textContent = '⟳ Sync…'; btn.className = 'sync-btn'; }
  else if (state === 'error') { btn.textContent = 'Réessayer'; btn.className = 'sync-btn primary'; }
  else { btn.textContent = 'Connecter Drive'; btn.className = 'sync-btn primary'; }
}

function handleSyncBtn() {
  if (driveState.connected) forceSyncToDrive();
  else initGoogleAuth();
}

// ── Auth Google ──
function initGoogleAuth() {
  if (!window.google || !GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith('VOTRE')) {
    alert('⚙️ Configure ton Client ID Google dans le fichier HTML.\nConsulte le guide de configuration fourni.');
    return;
  }
  setSyncUI('syncing', 'Connexion à Google…');
  google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPE,
    callback: async (resp) => {
      if (resp.error) { setSyncUI('error', 'Erreur de connexion Google'); return; }
      driveState.accessToken = resp.access_token;
      driveState.connected = true;
      localStorage.setItem('fitness_drive_token', resp.access_token);
      setSyncUI('syncing', 'Chargement des données Drive…');
      await loadFromDrive();
    }
  }).requestAccessToken();
}

function tryRestoreToken() {
  const saved = localStorage.getItem('fitness_drive_token');
  if (!saved || !window.google || !GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith('VOTRE')) return;
  try {
    google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPE, prompt: 'none',
      callback: async (resp) => {
        if (resp.error || !resp.access_token) return;
        driveState.accessToken = resp.access_token;
        driveState.connected = true;
        localStorage.setItem('fitness_drive_token', resp.access_token);
        setSyncUI('syncing', 'Restauration session Drive…');
        await loadFromDrive();
      }
    }).requestAccessToken();
  } catch(e) {}
}

// ── Requêtes Drive (find / load / save) ──
async function driveReq(method, url, bodyObj) {
  const headers = { Authorization: 'Bearer ' + driveState.accessToken };
  if (bodyObj) headers['Content-Type'] = 'application/json';
  const res = await fetch(url, { method, headers, body: bodyObj ? JSON.stringify(bodyObj) : undefined });
  if (res.status === 401) { driveState.connected = false; setSyncUI('error','Session expirée — reconnecte-toi'); return null; }
  return res;
}

async function findDriveFileByName(name) {
  const res = await driveReq('GET',
    `https://www.googleapis.com/drive/v3/files?q=name='${name}'+and+trashed=false&fields=files(id)`
  );
  if (!res) return null;
  const d = await res.json();
  return d.files && d.files.length > 0 ? d.files[0].id : null;
}

async function findDriveFile() {
  return findDriveFileByName(DRIVE_FILENAME);
}

async function findConfigDriveFile() {
  return findDriveFileByName(DRIVE_CONFIG_FILENAME);
}

async function loadFromDrive() {
  try {
    // 1) Config utilisateur : Drive prime sur localStorage/défauts.
    await loadConfigFromDrive();

    // 2) Progression (checks, journal).
    const fileId = await findDriveFile();
    if (fileId) {
      driveState.fileId = fileId;
      const res = await driveReq('GET', `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      if (!res) return;
      const remote = await res.json();
      driveState.data = Object.assign({}, getAllLocalData(), remote);
      // Hydrate EXERCISE_SCALES depuis Drive si présent (source de vérité prioritaire).
      if (driveState.data[SCALES_STORAGE_KEY] && typeof driveState.data[SCALES_STORAGE_KEY] === 'object') {
        EXERCISE_SCALES = driveState.data[SCALES_STORAGE_KEY];
        try { localStorage.setItem(SCALES_STORAGE_KEY, JSON.stringify(EXERCISE_SCALES)); } catch {}
      }
      setSyncUI('connected', 'Drive connecté · ' + DRIVE_FILENAME);
    } else {
      driveState.data = getAllLocalData();
      await saveToDrive();
      setSyncUI('connected', 'Drive connecté · fichier créé');
    }
    renderAllPanels(); renderTabs(); renderOverview();
  } catch(e) { setSyncUI('error', 'Erreur chargement Drive'); console.error(e); }
}

async function loadConfigFromDrive() {
  try {
    const fileId = await findConfigDriveFile();
    if (!fileId) {
      // Premier démarrage Drive : on pousse la config locale/défaut comme seed.
      await saveConfigToDrive();
      return;
    }
    driveState.configFileId = fileId;
    const res = await driveReq('GET', `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
    if (!res) return;
    const remote = await res.json();
    if (isValidConfig(remote)) {
      LIVE_CONFIG = remote;
      // Miroir localStorage pour un redémarrage offline cohérent.
      try { localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(remote)); } catch {}
    }
  } catch(e) { console.error('loadConfigFromDrive', e); }
}

async function saveToDrive() {
  if (!driveState.connected || !driveState.accessToken) return;
  setSyncUI('syncing', 'Sauvegarde en cours…');
  try {
    const blob = new Blob([JSON.stringify(driveState.data)], {type:'application/json'});
    const form = new FormData();
    const meta = {name: DRIVE_FILENAME, mimeType: 'application/json'};
    form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
    form.append('file', blob);
    let res;
    if (driveState.fileId) {
      res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveState.fileId}?uploadType=multipart`, {
        method: 'PATCH', headers: {Authorization:'Bearer '+driveState.accessToken}, body: form
      });
    } else {
      res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: {Authorization:'Bearer '+driveState.accessToken}, body: form
      });
      const created = await res.json();
      driveState.fileId = created.id;
    }
    const t = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    setSyncUI('connected', `Drive · sync ${t}`);
  } catch(e) { setSyncUI('error', 'Erreur sauvegarde Drive'); console.error(e); }
}

async function saveConfigToDrive() {
  if (!driveState.connected || !driveState.accessToken) return;
  try {
    const blob = new Blob([JSON.stringify(LIVE_CONFIG)], {type:'application/json'});
    const form = new FormData();
    const meta = {name: DRIVE_CONFIG_FILENAME, mimeType: 'application/json'};
    form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
    form.append('file', blob);
    if (driveState.configFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveState.configFileId}?uploadType=multipart`, {
        method: 'PATCH', headers: {Authorization:'Bearer '+driveState.accessToken}, body: form
      });
    } else {
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: {Authorization:'Bearer '+driveState.accessToken}, body: form
      });
      const created = await res.json();
      driveState.configFileId = created.id;
    }
  } catch(e) { console.error('saveConfigToDrive', e); }
}

// ── Planification de sauvegarde & storage API ──
// Debounce 2 s : regroupe les sauvegardes multiples (ex: cocher 3 séries d'affilée → 1 seul appel Drive)
function scheduleSave() {
  if (driveState.saveTimer) clearTimeout(driveState.saveTimer);
  driveState.saveTimer = setTimeout(() => { if (driveState.connected) saveToDrive(); }, 2000);
}

// Debounce dédié à la config : évite qu'une édition admin rapide génère plusieurs uploads.
function scheduleSaveConfig() {
  if (driveState.configSaveTimer) clearTimeout(driveState.configSaveTimer);
  driveState.configSaveTimer = setTimeout(() => { if (driveState.connected) saveConfigToDrive(); }, 2000);
}

// API publique : valide via isValidConfig, met à jour meta.lastModified, remplace
// LIVE_CONFIG, miroir immédiat en localStorage, puis planifie l'upload Drive
// (debounce 2 s). Appelée par tout le mode admin après chaque édition/import/reset.
// `source` trace l'origine ('user' par défaut, 'import' après chargement JSON,
// 'default' après un Reset).
function saveConfig(newConfig, source) {
  if (!isValidConfig(newConfig)) { console.warn('saveConfig: config invalide, ignorée'); return false; }
  newConfig.meta = newConfig.meta || {};
  newConfig.meta.lastModified = new Date().toISOString();
  newConfig.meta.source = source || 'user';
  LIVE_CONFIG = newConfig;
  try { localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(newConfig)); } catch(e) { console.error(e); }
  if (driveState.connected) scheduleSaveConfig();
  return true;
}

function getAllLocalData() {
  const all = {};
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('fitness_w')) {
      try { all[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
    }
  }
  // Inclure le mapping des scales par exercice (donnée utilisateur globale)
  const rawScales = localStorage.getItem(SCALES_STORAGE_KEY);
  if (rawScales) {
    try { all[SCALES_STORAGE_KEY] = JSON.parse(rawScales); } catch(e) {}
  }
  return all;
}

async function forceSyncToDrive() {
  driveState.data = getAllLocalData();
  await saveToDrive();
}

// ── STORAGE API ──
function storageKey(dayId, sub) {
  return `fitness_${getWeekKey()}_${dayId}_${sub}`;
}

function loadData(dayId) {
  try {
    const ck = storageKey(dayId,'checks');
    const jk = storageKey(dayId,'journal');
    const src = driveState.connected ? driveState.data : {};
    const checks = src[ck] || JSON.parse(localStorage.getItem(ck)||'{}');
    const journal = src[jk] || JSON.parse(localStorage.getItem(jk)||'{}');
    return { checks, journal };
  } catch(e) { return { checks:{}, journal:{} }; }
}

function saveChecks(dayId, checks) {
  const k = storageKey(dayId,'checks');
  localStorage.setItem(k, JSON.stringify(checks));
  if (driveState.connected) { driveState.data[k] = checks; scheduleSave(); }
}

function saveJournal(dayId, journal) {
  const k = storageKey(dayId,'journal');
  localStorage.setItem(k, JSON.stringify(journal));
  if (driveState.connected) { driveState.data[k] = journal; scheduleSave(); }
}

// ╔══════════════════════════════════════════════╗
// ║  RENDER — Génération du DOM                  ║
// ╚══════════════════════════════════════════════╝
// getSessionsForDay  → délègue à LIVE_CONFIG.sessions (jamais de constante figée)
// countExercises     → total / done par jour (alimente overview + onglets)
// renderOverview     → anneaux de progression hebdo dans la topbar
// renderTabs         → onglets jours avec compteur done/total
// switchDay          → change le jour actif + scroll tab
// renderAllPanels    → rend tous les panneaux et restaure l'état visuel des séries
// renderDayPanel     → panneau complet (stats, sessions, journal) pour un jour
// Logique d'ouverture auto : la 1re session incomplète après la dernière
// terminée reste dépliée, les autres sont collapsed (cf CLAUDE.md).

// ── Helpers & utilitaires de rendu ──
function getSessionsForDay(dayId) {
  const day = LIVE_CONFIG.days.find(d=>d.id===dayId);
  if (!day) return null;
  if (day.type === 'weekend') {
    const w = LIVE_CONFIG.sessions.weekend;
    if (!w) return null;
    return w[dayId] || null;
  }
  return LIVE_CONFIG.sessions[day.type];
}

function countExercises(dayId) {
  const sessions = getSessionsForDay(dayId);
  if (!sessions) return { total:0, done:0 };
  let total=0, done=0;
  const { checks } = loadData(dayId);
  sessions.forEach(s => {
    if (s.isVelo) {
      total++;
      if (checks['velo_'+s.veloDir]) done++;
    } else if (s.exercises) {
      s.exercises.forEach(ex => {
        total++;
        if (checks[ex.id]) done++;
      });
    }
  });
  return { total, done };
}

function renderOverview() {
  const bar = document.getElementById('overview-bar');
  bar.innerHTML = '';
  LIVE_CONFIG.days.forEach(d => {
    const { total, done } = countExercises(d.id);
    const pct = total ? Math.round(done/total*100) : 0;
    const cls = pct===100 ? 'full' : pct>0 ? 'partial' : '';
    const isActive = d.id === activeDay ? 'active-day' : '';
    const div = document.createElement('div');
    div.className = 'ov-day';
    div.innerHTML = `<div class="ov-ring ${cls} ${isActive}">${pct}%</div><div class="ov-label">${d.label}</div>`;
    div.onclick = () => switchDay(d.id);
    bar.appendChild(div);
  });
}

function renderTabs() {
  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = '';
  LIVE_CONFIG.days.forEach(d => {
    const { total, done } = countExercises(d.id);
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (d.id===activeDay?' active':'');
    tab.id = 'tab_'+d.id;
    const dotColor = d.type==='bureau'?'#C05A20':d.type==='tele'?'#2E6E4E':'#4A4FA8';
    tab.innerHTML = `${d.fullName}<span class="done-count">${done}/${total}</span><span class="day-dot" style="background:${dotColor}"></span>`;
    tab.onclick = () => switchDay(d.id);
    tabs.appendChild(tab);
  });
}

function switchDay(dayId) {
  activeDay = dayId;
  renderTabs();
  renderOverview();
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel_'+dayId);
  if (panel) panel.classList.add('active');
  // Scroll tab into view
  const tab = document.getElementById('tab_'+dayId);
  if (tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function renderAllPanels() {
  const container = document.getElementById('day-panels');
  container.innerHTML = '';
  LIVE_CONFIG.days.forEach(d => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (d.id===activeDay?' active':'');
    panel.id = 'panel_'+d.id;
    panel.innerHTML = renderDayPanel(d);
    container.appendChild(panel);
    // Bind events after DOM insert
    bindDayEvents(d.id, panel);
    // Restore series visual state for already-validated exercises
    const { checks } = loadData(d.id);
    Object.keys(checks).forEach(exId => {
      if (!checks[exId]) return;
      const tracker = document.getElementById('st_' + d.id + '_' + exId);
      if (!tracker) return;
      tracker.querySelectorAll('.serie-check').forEach(chk => {
        chk.classList.add('done');
        chk.textContent = '✓';
      });
    });
  });
}

// ── renderDayPanel : panneau complet d'un jour (sessions + journal) ──
function renderDayPanel(day) {
  const sessions = getSessionsForDay(day.id);
  const { checks, journal } = loadData(day.id);

  // Day header stats
  let totalMin = 0, totalKm = 0, totalKcal = 0;
  if (sessions) {
    sessions.forEach(s => {
      if (s.isVelo) { totalKm += 10; totalKcal += 220; totalMin += 30; }
      else if (s.exercises) {
        const mins = parseInt(s.duration)||0;
        totalMin += (parseInt(s.duration)||20);
        totalKcal += Math.round((parseInt(s.duration)||20) * 2.5);
      }
    });
  }

  let html = `
    <div class="day-header">
      <div class="day-title-block">
        <div class="day-name">${day.fullName}</div>
        <span class="day-type-badge badge-${LIVE_CONFIG.typeColors[day.type]}">${LIVE_CONFIG.typeLabels[day.type]}</span>
      </div>
      <div class="day-stats">
        <div class="stat-pill"><div class="stat-val">${totalMin}</div><div class="stat-lbl">min</div></div>
        ${totalKm ? `<div class="stat-pill"><div class="stat-val">${totalKm}</div><div class="stat-lbl">km vélo</div></div>` : ''}
        <div class="stat-pill"><div class="stat-val">~${totalKcal}</div><div class="stat-lbl">kcal</div></div>
      </div>
    </div>`;

  if (!sessions) {
    html += `<div class="soon-card"><div class="soon-icon">🗓️</div><div class="soon-title">Aucune séance prévue</div></div>`;
  } else {
    // lastDoneIdx : dernier index d'une session entièrement cochée (toutes les exercises.checked).
    // targetOpenIdx : première session APRÈS lastDoneIdx qui n'est pas finie.
    // Résultat : une seule session reste dépliée — la prochaine à faire dans la journée.
    // Les sessions vélo (isVelo) ne participent pas au calcul car elles n'ont pas de exercises[].
    const lastDoneIdx = sessions.reduce((found, s, idx) => {
      if (s.exercises && s.exercises.every(ex => checks[ex.id])) return idx;
      return found;
    }, -1);
    const targetOpenIdx = sessions.findIndex((s, idx) =>
      idx > lastDoneIdx && s.exercises && !s.exercises.every(ex => checks[ex.id])
    );
    sessions.forEach((s, sIdx) => {
      if (s.isVelo) {
        const isChecked = checks['velo_'+s.veloDir] ? 'checked' : '';
        html += `<div class="velo-card">
          <div class="velo-icon">🚴</div>
          <div class="velo-info">
            <div class="velo-title">${s.title}</div>
            <div class="velo-sub">${s.desc}</div>
            <div class="velo-stats">
              <div class="velo-stat"><strong>${s.veloStats.km} km</strong>distance</div>
              <div class="velo-stat"><strong>${s.veloStats.duree}</strong>durée</div>
              <div class="velo-stat"><strong>${s.veloStats.cal}</strong>calories</div>
              <div class="velo-stat"><strong>${s.veloStats.difficulte}</strong>intensité</div>
            </div>
            <div class="velo-check-row">
              <div class="velo-checkbox ${isChecked}" id="vcheck_${day.id}_${s.veloDir}" onclick="toggleVelo('${day.id}','${s.veloDir}',this)">${isChecked?'✓':''}</div>
              <span class="velo-check-label">Trajet effectué</span>
            </div>
          </div>
        </div>`;
      } else if (s.exercises) {
        const allDone = s.exercises.every(ex => checks[ex.id]);
        const sessionCollapsed = allDone || sIdx !== targetOpenIdx;

        // firstOpenExFound : flag one-shot pour ne laisser ouvert que le premier exercice non coché.
        // Tous les exercices cochés ET tous ceux qui suivent le premier ouvert sont repliés.
        let firstOpenExFound = false;
        const exListHtml = s.exercises.map((ex,i) => {
          const checked = checks[ex.id] ? 'checked' : '';
          const exCollapsed = !!checked || firstOpenExFound;
          if (!checked && !firstOpenExFound) firstOpenExFound = true;
          const exScale = getExerciseScale(ex.id);
          const scaleBadge = exScale !== 100 ? `<span class="scale-badge" id="sbadge_${day.id}_${ex.id}">×${exScale}%</span>` : `<span class="scale-badge" id="sbadge_${day.id}_${ex.id}" style="display:none">×${exScale}%</span>`;
          return `<div class="ex-item${exCollapsed?' collapsed':''}" id="exitem_${day.id}_${ex.id}"><div class="ex-row ${checked}" id="exrow_${day.id}_${ex.id}" onclick="toggleExCollapse(event,'${day.id}','${ex.id}')">
                <button type="button" class="ex-check" onclick="event.stopPropagation();toggleEx('${day.id}','${ex.id}','${s.id}')">${checked?'✓':''}</button>
                <div class="ex-body">
                  <div class="ex-name">${i+1}. ${ex.name}${ex.url ? `<a class="ex-info-link" href="${ex.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Fiche technique">↗</a>` : ''}</div>
                  <div class="ex-desc">${ex.desc}</div>
                </div>
                <div class="ex-right">
                  <span class="ex-reps" id="sreps_${day.id}_${ex.id}">${scaledRepsString(ex)}</span>
                  ${ex.charge ? `<span class="charge-tag">${ex.charge}</span>` : ''}
                  ${scaleBadge}
                  <div class="type-dot dot-${ex.type}"></div>
                </div>
                <button class="ex-toggle">▾</button>
              </div>
              <div class="ex-scale-row" onclick="event.stopPropagation()">
                <span class="ex-scale-label">Intensité</span>
                <input type="range" class="ex-scale-slider" min="50" max="150" step="5" value="${exScale}" oninput="onExerciseScaleInput('${day.id}','${ex.id}',this.value)" onchange="onExerciseScaleChange('${day.id}','${ex.id}',this.value)">
                <span class="ex-scale-value" id="sval_${day.id}_${ex.id}">${exScale}%</span>
              </div>
              ${ex.subExos ? renderSubExoTracker(day.id, ex) : isDurationEx(ex) ? renderSeriesTracker(day.id, ex) : renderRepTracker(day.id, ex)}</div>`;
        }).join('');

        html += `<div class="session-card${sessionCollapsed?' collapsed':''}" data-sid="${s.id}">
          <div class="session-head" onclick="toggleSession(event,'${day.id}','${s.id}')">
            <div class="session-emoji">${s.emoji}</div>
            <div class="session-info">
              <div class="session-title">${s.title}</div>
              <div class="session-meta">${s.desc}</div>
            </div>
            <div>
              <div class="session-duration">${s.duration}</div>
              <span class="session-done-badge ${allDone?'visible':''}">✓ Terminé</span>
            </div>
            <button class="session-toggle" onclick="toggleSession(event,'${day.id}','${s.id}')">▾</button>
          </div>
          ${s.note ? `<div class="note-banner">💡 ${s.note}</div>` : ''}
          <div class="ex-list">${exListHtml}</div>
        </div>`;
      }
    });
  }

  // Journal
  const jData = journal || {};
  const stars = jData.rating || 0;
  const feeling = jData.feeling || '';
  const note = jData.note || '';

  html += `<div class="journal-section">
    <div class="journal-title">📔 Journal du jour</div>
    <div class="rating-row">
      <span class="rating-lbl">Séance</span>
      ${[1,2,3,4,5].map(n=>`<button class="star-btn ${stars>=n?'active':''}" id="star_${day.id}_${n}" onclick="setStar('${day.id}',${n})">★</button>`).join('')}
    </div>
    <div class="rating-row">
      <span class="rating-lbl">Ressenti</span>
      <div class="feeling-btns">
        ${['😴 Fatigué','💪 En forme','😅 Difficile','✅ Parfait','🤕 Douleur'].map(f=>`<button class="feel-btn ${feeling===f?'selected':''}" onclick="setFeeling('${day.id}','${f}',this)">${f}</button>`).join('')}
      </div>
    </div>
    <textarea class="journal-textarea" id="journal_${day.id}" placeholder="Notes, observations, douleurs éventuelles...">${note}</textarea>
    <button class="save-btn" onclick="saveJournalEntry('${day.id}')">Enregistrer les notes</button>
    <div class="save-confirm" id="saveconfirm_${day.id}">✓ Enregistré</div>
  </div>`;

  return html;
}

// ╔══════════════════════════════════════════════╗
// ║  INTERACTIONS — Handlers utilisateur         ║
// ╚══════════════════════════════════════════════╝
// toggleEx       → case principale d'un exercice (sync → toutes les séries)
// toggleVelo     → case d'une direction vélo (aller / retour)
// toggleSerieCheck / repSerieCheck / syncExValidation → cases série (durée / reps)
// setStar / setFeeling / saveJournalEntry → journal quotidien (note, ressenti, texte)
// updateSessionBadge / updateTabCount     → badges de progression par session / jour

// Historique : les events étaient initialement bindés ici ; aujourd'hui les
// gestionnaires sont inline (onclick="…") dans le HTML généré par renderDayPanel,
// donc ce bind est un no-op conservé pour extension future.
function bindDayEvents(dayId, panel) { /* events are inline for simplicity */ }

// toggleEx : case principale de l'exercice (non via les séries).
// Sens inverse de syncExValidation : force toutes les serie-check du tracker
// à l'état coché/décoché pour rester cohérent avec l'exercice parent.
// ── Handlers slider d'intensité ──
// onExerciseScaleInput : appelé en continu pendant le drag — update léger du label %.
// onExerciseScaleChange : appelé au relâchement — persiste + rafraîchit le tracker.
function onExerciseScaleInput(dayId, exId, rawValue) {
  const pct = Math.max(50, Math.min(150, Math.round(parseInt(rawValue, 10) / 5) * 5));
  const valEl = document.getElementById(`sval_${dayId}_${exId}`);
  if (valEl) valEl.textContent = pct + '%';
}

function onExerciseScaleChange(dayId, exId, rawValue) {
  const pct = saveScale(exId, parseInt(rawValue, 10));
  // Récupère l'exercice depuis LIVE_CONFIG pour recalculer l'affichage.
  const sessions = getSessionsForDay(dayId);
  if (!sessions) return;
  let exObj = null;
  for (const s of sessions) {
    if (!s.exercises) continue;
    const found = s.exercises.find(e => e.id === exId);
    if (found) { exObj = found; break; }
  }
  if (!exObj) return;

  // 1) Reps label sur la carte
  const repsEl = document.getElementById(`sreps_${dayId}_${exId}`);
  if (repsEl) repsEl.textContent = scaledRepsString(exObj);
  // 2) Badge ×NN%
  const badgeEl = document.getElementById(`sbadge_${dayId}_${exId}`);
  if (badgeEl) {
    badgeEl.textContent = `×${pct}%`;
    badgeEl.style.display = pct !== 100 ? '' : 'none';
  }
  // 3) Value label sous le slider
  const valEl = document.getElementById(`sval_${dayId}_${exId}`);
  if (valEl) valEl.textContent = pct + '%';
  // 4) Tracker de séries : remplace le markup (les onclick portent la nouvelle durée)
  const tracker = document.getElementById(`st_${dayId}_${exId}`);
  if (tracker && tracker.parentNode) {
    const newHtml = exObj.subExos ? renderSubExoTracker(dayId, exObj)
                   : isDurationEx(exObj) ? renderSeriesTracker(dayId, exObj)
                   : renderRepTracker(dayId, exObj);
    const wrapper = document.createElement('div');
    wrapper.innerHTML = newHtml;
    tracker.parentNode.replaceChild(wrapper.firstElementChild, tracker);
    // Restaure l'état "done" des séries cochées côté checks
    const { checks } = loadData(dayId);
    if (checks[exId]) {
      const newTracker = document.getElementById(`st_${dayId}_${exId}`);
      if (newTracker) newTracker.querySelectorAll('.serie-check').forEach(c => {
        c.classList.add('done'); c.textContent = '✓';
      });
    }
  }
  // 5) Modale timer active pour cet exercice : rafraîchir reps + badge échelle
  if (modalState.active && modalState.sid && modalState.sid.startsWith(`${dayId}_${exId}_`)) {
    const tmReps = document.getElementById('tm-reps');
    if (tmReps) tmReps.textContent = scaledRepsString(exObj);
    const tmScale = document.getElementById('tm-scale');
    if (tmScale) {
      if (pct !== 100) { tmScale.textContent = `×${pct}%`; tmScale.style.display = ''; }
      else { tmScale.style.display = 'none'; }
    }
  }
}

function toggleEx(dayId, exId, sessionId) {
  const { checks } = loadData(dayId);
  checks[exId] = !checks[exId];
  saveChecks(dayId, checks);
  const row = document.getElementById('exrow_' + dayId + '_' + exId);
  if (!row) return;
  row.classList.toggle('checked', checks[exId]);
  row.querySelector('.ex-check').textContent = checks[exId]?'✓':'';
  // Sync all series checks with the exercise state
  const tracker = document.getElementById('st_' + dayId + '_' + exId);
  if (tracker) {

// ╔══════════════════════════════════════════════╗
// ║  TIMERS & SERIES TRACKER                     ║
// ╚══════════════════════════════════════════════╝
// isDurationEx           → détecte durée vs reps (regex \d+\s*s|min sur ex.reps)
// parseReps/parseRepSets → deux parseurs distincts (durée vs reps), doc CLAUDE.md
// renderSeriesTracker    → trackers pour exercices en durée (simple ou /côté)
// renderRepTracker       → trackers pour exercices en reps (simple ou /côté)
// renderSubExoTracker    → trackers pour exercices combinés (Sphinx→Enfant)
// repSerieCheck          → case série reps (3 états : cocher, annuler repos, décocher)
// beep* / playExerciseCompleteSound → Web Audio API (phases + fanfares fin)
// startSerieTimer + tickSerieTimer + transitionToWork + finishWorkPhase +
//   finishRestPhase + resetSerieTimer → cycle 3 phases prep→work→rest
// openTimerModal + closeTimerModal + updateTimerModal + pauseModalTimer +
//   skipModalTimer + resetModalTimer → modale plein écran liée au timer actif

function fmtTime(s) {
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

// ── Audio beeps via Web Audio API ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, duration, vol=0.3, type='sine') {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + duration);
  } catch(e) {}
}
// 3 bips distincts
function beepStart()  { beep(880, 0.15, 0.4); }             // aigu court — début
function beepHalf()   { beep(660, 0.2, 0.3); setTimeout(()=>beep(660,0.2,0.3),250); } // double médium — mi-temps
function beepEnd()    { beep(440, 0.12, 0.4); setTimeout(()=>beep(440,0.12,0.4),180); setTimeout(()=>beep(440,0.25,0.5),360); } // triple grave — fin
function beepRestEnd(){ beep(880, 0.12, 0.4); setTimeout(()=>beep(1100,0.3,0.5),200); } // aigu montant — fin repos
// Petit arpège victorieux C-E-G-C — fin de la dernière série d'un exercice
