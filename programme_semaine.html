// Choisit le son selon l'état du jour/séance :
//   journée complétée → fanfare ; séance complétée → victoire moyenne ; sinon → petit arpège.
function playExerciseCompleteSound(chk) {
  const tracker = chk ? chk.closest('.series-tracker') : null;
  const dayId = tracker ? tracker.dataset.day : null;
  const exId  = tracker ? tracker.dataset.ex  : null;
  if (!dayId) { beepExerciseDone(); return; }
  const { total, done } = countExercises(dayId);
  if (total > 0 && done === total) { beepDayDone(); return; }
  if (exId) {
    const sessionId = getSessionIdForEx(dayId, exId);
    const sessions = getSessionsForDay(dayId);
    const s = sessions ? sessions.find(x => x.id === sessionId) : null;
    if (s && s.exercises) {
      const { checks } = loadData(dayId);
      if (s.exercises.every(ex => checks[ex.id])) { beepSessionDone(); return; }
    }
  }
  beepExerciseDone();
}

// ── Detect duration-based exercises ──
function isDurationEx(ex) {
  return /\d+\s*s/.test(ex.reps) || /\d+\s*min/.test(ex.reps);
}

// parseReps : utilisée par renderSeriesTracker (exercices en DURÉE uniquement).
// Divise totalSec par (sets × 2) si latéral, sinon par sets.
// restSec est déduit de la durée par côté : ≥40 s → 20 s de repos, sinon 15 s.
function parseReps(reps, totalSec) {
  const lateral = /\/côté/.test(reps);
  const setMatch = reps.match(/^(\d+)\s*[×x]/);
  const sets = setMatch ? parseInt(setMatch[1]) : 1;
  // Si latéral : totalSec couvre TOUS les sets × 2 côtés → sec par côté par set = totalSec / (sets*2)
  const secPerSide = lateral
    ? Math.round(totalSec / (sets * 2))
    : Math.round(totalSec / sets);
  const restSec = secPerSide >= 40 ? 20 : 15;
  return { sets, secPerSide, restSec, lateral };
}

// ── Render series tracker HTML ──
function renderSeriesTracker(dayId, ex) {
  const { sets, secPerSide, restSec, lateral } = parseReps(ex.reps, scaledSec(ex));
  let html = `<div class="series-tracker" id="st_${dayId}_${ex.id}" data-day="${dayId}" data-ex="${ex.id}">`;

  if (lateral) {
    // 6 rows (for 3 sets): Gauche 1/3, Droite 1/3, Gauche 2/3 ...
    const sides = ['G', 'D'];
    const sideLabels = ['Gauche', 'Droite'];
    for (let i = 0; i < sets; i++) {
      for (let s = 0; s < 2; s++) {
        const sid = `${dayId}_${ex.id}_s${i}_${sides[s]}`;
        const isLastRow = (i === sets-1 && s === 1);
        html += `<div class="series-row" id="srow_${sid}">
          <div class="serie-check" id="schk_${sid}" onclick="toggleSerieCheck('${sid}')"></div>
          <span class="serie-label">${sideLabels[s]} ${i+1}/${sets}</span>
          <button class="serie-timer-btn" id="stbtn_${sid}" onclick="startSerieTimer('${sid}',${secPerSide},${restSec},${i*2+s},${sets*2})">
            ▶ <span id="stdisp_${sid}">${fmtTime(secPerSide)}</span>
          </button>
          <span class="serie-phase" id="sphase_${sid}"></span>
        </div>`;
      }
    }
  } else {
    for (let i = 0; i < sets; i++) {
      const sid = `${dayId}_${ex.id}_s${i}`;
      html += `<div class="series-row" id="srow_${sid}">
        <div class="serie-check" id="schk_${sid}" onclick="toggleSerieCheck('${sid}')"></div>
        <span class="serie-label">Série ${i+1}/${sets}</span>
        <button class="serie-timer-btn" id="stbtn_${sid}" onclick="startSerieTimer('${sid}',${secPerSide},${restSec},${i},${sets})">
          ▶ <span id="stdisp_${sid}">${fmtTime(secPerSide)}</span>
        </button>
        <span class="serie-phase" id="sphase_${sid}"></span>
      </div>`;
    }
  }

  html += `</div>`;
  return html;
}

// ── Render rep-based series tracker (checkboxes + rest timer) ──
// parseRepSets : utilisée par renderRepTracker (exercices en REPS uniquement).
// Exige un chiffre immédiatement après le × pour distinguer "3 × 12" (3 séries)
// de "10 × chaque sens" ou "10 souffles" qui doivent rester à 1 seule série.
function parseRepSets(reps) {
  const m = reps.match(/^(\d+)\s*[×x]\s*(\d)/);
  return m ? parseInt(m[1]) : 1;
}

// ── Helpers de scaling (slider 50–150 %) ──
// Point d'entrée unique pour toute valeur affichée ou envoyée au timer :
// si l'exercice a un scale != 100, ex.sec / ex.reps / sub.sec sont remappés ici.
function scaledSec(ex) {
  const s = getExerciseScale(ex.id);
  return Math.max(1, Math.round((ex.sec || 0) * s / 100));
}

function scaledSubSec(ex, sub) {
  const s = getExerciseScale(ex.id);
  return Math.max(1, Math.round((sub.sec || 0) * s / 100));
}

// Remplace "N × M" (et "N × M s") par les valeurs scalées dans ex.reps. Conserve
// tel quel les formats non reconnus ("10 souffles", "3 min", "10 × chaque sens").
function scaledRepsString(ex) {
  const s = getExerciseScale(ex.id);
  if (s === 100 || !ex.reps) return ex.reps || '';
  return ex.reps.replace(/^(\d+)\s*([×x])\s*(\d+)(\s*s)?/, (_, sets, sign, val, sSuffix) => {
    const scaled = Math.max(1, Math.round(parseInt(val) * s / 100));
    return `${sets} ${sign} ${scaled}${sSuffix || ''}`;
  });
}

function renderRepTracker(dayId, ex) {
  const sets = parseRepSets(ex.reps);
  const lateral = /\/côté/.test(ex.reps);
  const restSec = 60;
  const info = ex.serieInfo || '';
  let html = `<div class="series-tracker" id="st_${dayId}_${ex.id}" data-day="${dayId}" data-ex="${ex.id}">`;
  if (info) html += `<span class="serie-info">${info}</span>`;

  if (lateral) {
    const sides = ['G', 'D'];
    const sideLabels = ['Gauche', 'Droite'];
    for (let i = 0; i < sets; i++) {
      for (let s = 0; s < 2; s++) {
        const sid = `${dayId}_${ex.id}_s${i}_${sides[s]}`;
        const isLast = (i === sets-1 && s === 1);
        html += `<div class="series-row" id="srow_${sid}">
          <div class="serie-check" id="schk_${sid}" onclick="repSerieCheck('${sid}',${restSec},${isLast})"></div>
          <span class="serie-label">${sideLabels[s]} ${i+1}/${sets}</span>
          <span class="serie-phase" id="sphase_${sid}"></span>
          <span id="stdisp_${sid}" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;display:none"></span>
        </div>`;
      }
    }
  } else {
    for (let i = 0; i < sets; i++) {
      const sid = `${dayId}_${ex.id}_s${i}`;
      const isLast = i === sets - 1;
      html += `<div class="series-row" id="srow_${sid}">
        <div class="serie-check" id="schk_${sid}" onclick="repSerieCheck('${sid}',${restSec},${isLast})"></div>
        <span class="serie-label">Série ${i+1}/${sets}</span>
        <span class="serie-phase" id="sphase_${sid}"></span>
        <span id="stdisp_${sid}" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;display:none"></span>
      </div>`;
    }
  }

  html += `</div>`;
  return html;
}

// repSerieCheck : gère 3 états pour une case série de type "reps".
//   État 1 — non cochée, pas de timer → coche + lance décompte repos (sauf dernière série).
//   État 2 — cochée + timer repos en cours → annule le timer (correction en cours de repos).
//   État 3 — cochée, pas de timer → décoche (correction manuelle possible).
function repSerieCheck(sid, restSec, isLast) {
  const chk = document.getElementById('schk_'+sid);
  const phase = document.getElementById('sphase_'+sid);
  const disp = document.getElementById('stdisp_'+sid);
  if (!chk) return;

  // État 3 : déjà cochée, pas de timer → décoche (correction)
  if (chk.classList.contains('done') && (!serieTimers[sid] || !serieTimers[sid].interval)) {
    chk.classList.remove('done'); chk.textContent = '';
    if (phase) { phase.textContent = ''; phase.className = 'serie-phase'; }
    if (disp) disp.style.display = 'none';
    syncExValidation(chk);
    return;
  }

  // État 2 : timer repos en cours → annule
  if (serieTimers[sid] && serieTimers[sid].interval) {
    clearInterval(serieTimers[sid].interval);
    serieTimers[sid] = null;
    if (disp) disp.style.display = 'none';
    if (phase) { phase.textContent = ''; phase.className = 'serie-phase'; }
    return;
  }

  // État 1 : coche la série
  chk.classList.add('done'); chk.textContent = '✓';
  syncExValidation(chk);
  if (isLast) {
    playExerciseCompleteSound(chk);
    if (phase) { phase.textContent = 'Exercice terminé !'; phase.className = 'serie-phase active-phase'; }
    return;
  }
  beepEnd();

  // Start rest countdown
  if (phase) { phase.textContent = 'Repos…'; phase.className = 'serie-phase'; }
  if (disp) { disp.style.display = 'inline'; disp.textContent = fmtTime(restSec); }

  serieTimers[sid] = { interval: null, remaining: restSec };
  serieTimers[sid].interval = setInterval(() => {
    const st = serieTimers[sid];
    if (!st) return;
    st.remaining--;
    const d = document.getElementById('stdisp_'+sid);
    if (d) d.textContent = fmtTime(Math.max(0, st.remaining));
    if (st.remaining <= 0) {
      clearInterval(st.interval);
      serieTimers[sid] = null;
      beepRestEnd();
      if (d) d.style.display = 'none';
      const ph = document.getElementById('sphase_'+sid);
      if (ph) { ph.textContent = 'Série suivante !'; ph.className = 'serie-phase active-phase'; }
      setTimeout(() => {
        const ph2 = document.getElementById('sphase_'+sid);
        if (ph2 && ph2.textContent === 'Série suivante !') { ph2.textContent = ''; ph2.className = 'serie-phase'; }
      }, 3000);
    }
  }, 1000);
}

// ── Series timer state ──
// Map sid → état courant d'un timer de série en durée. Forme par entrée :
//   { interval, remaining, phase:'prep'|'work'|'rest', paused,
//     secPerSet, restSec, serieIdx, totalSets }
// Un sid absent ou à null = timer non démarré (ou déjà terminé/reset).
const serieTimers = {};

// ── TIMER MODAL (overlay plein écran affiché pendant une série en durée) ──
// Affiche résumé exercice/série, numéro de série, temps restant, et expose
// 3 actions utilisateur : pause/reprise, saut (valide la série en work),
// reset (annule la série, ne valide pas). Un seul timer peut être actif ;
// modalState trace le sid courant pour ignorer tout update provenant
// d'un autre tracker encore en vie.
// PREP_SECS : phase de préparation avant chaque série (bip à chaque seconde).
const PREP_SECS = 3;
const modalState = { sid: null, active: false };

function findExerciseInfo(dayId, exId) {
  const sessions = getSessionsForDay(dayId);
  if (!sessions) return null;
  for (const s of sessions) {
    if (s.exercises) {
      const ex = s.exercises.find(e => e.id === exId);
      if (ex) return ex;
    }
  }
  return null;
}

function openTimerModal(sid) {
  const btn = document.getElementById('stbtn_'+sid);
  if (!btn) return;
  const tracker = btn.closest('.series-tracker');
  if (!tracker) return;
  const dayId = tracker.dataset.day;
  const exId = tracker.dataset.ex;
  const ex = findExerciseInfo(dayId, exId);
  if (!ex) return;
  // Étiquette série : réutilise le label déjà rendu ("Série 2/3", "Gauche 1/3", "Sphinx 2/3"…)
  const row = document.getElementById('srow_'+sid);
  const labelEl = row ? row.querySelector('.serie-label') : null;
  const serieLabel = labelEl ? labelEl.textContent : '';
  document.getElementById('tm-ex-name').textContent = ex.name;
  document.getElementById('tm-ex-desc').textContent = ex.desc || '';
  document.getElementById('tm-serie').textContent = serieLabel;
  document.getElementById('tm-reps').textContent = scaledRepsString(ex);
  const exScale = getExerciseScale(ex.id);
  const tmScale = document.getElementById('tm-scale');
  if (tmScale) {
    if (exScale !== 100) { tmScale.textContent = `×${exScale}%`; tmScale.style.display = ''; }
    else { tmScale.style.display = 'none'; }
  }
  const pauseBtn = document.getElementById('tm-pause');
  if (pauseBtn) pauseBtn.textContent = '⏸ Pause';
  modalState.sid = sid;
  modalState.active = true;
  const modal = document.getElementById('timer-modal');
  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden', 'false');
}

function closeTimerModal() {
  const modal = document.getElementById('timer-modal');
  if (!modal) return;
  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden', 'true');
  modalState.sid = null;
  modalState.active = false;
  const timeEl = document.getElementById('tm-time');
  if (timeEl) timeEl.classList.remove('paused');
}

function updateTimerModal(sid, phaseType, remaining) {
  if (!modalState.active || modalState.sid !== sid) return;
  const phaseEl = document.getElementById('tm-phase');
  const timeEl = document.getElementById('tm-time');
  const labels = { prep: 'Préparez-vous', work: 'En cours', rest: 'Repos' };
  if (phaseEl) {
    phaseEl.textContent = labels[phaseType] || '';
    phaseEl.className = 'tm-phase ' + phaseType;
  }
  if (timeEl) {
    timeEl.classList.toggle('rest', phaseType === 'rest');
    if (phaseType === 'prep') {
      timeEl.classList.add('big');
      timeEl.textContent = String(Math.max(0, remaining));
    } else {
      timeEl.classList.remove('big');
      timeEl.textContent = fmtTime(Math.max(0, remaining));
    }
  }
}

function pauseModalTimer() {
  const st = serieTimers[modalState.sid];
  if (!st) return;
  st.paused = !st.paused;
  const btn = document.getElementById('tm-pause');
  if (btn) btn.textContent = st.paused ? '▶ Reprendre' : '⏸ Pause';
  const timeEl = document.getElementById('tm-time');
  if (timeEl) timeEl.classList.toggle('paused', st.paused);
}

function skipModalTimer() {
  const sid = modalState.sid;
  const st = serieTimers[sid];
  if (!st) return;
  st.paused = false;
  if (st.phase === 'prep') {
    transitionToWork(sid);
    return;
  }
  if (st.phase === 'work') {
    finishWorkPhase(sid);
    return;
  }
  if (st.phase === 'rest') {
    finishRestPhase(sid);
    return;
  }
}

function resetModalTimer() {
  const sid = modalState.sid;
  if (!sid) { closeTimerModal(); return; }
  resetSerieTimer(sid);
  closeTimerModal();
}

function resetSerieTimer(sid) {
  const st = serieTimers[sid];
  const btn = document.getElementById('stbtn_'+sid);
  const phase = document.getElementById('sphase_'+sid);
  if (st) {
    clearInterval(st.interval);
    const secPerSet = st.secPerSet;
    serieTimers[sid] = null;
    if (btn) {
      btn.classList.remove('running','rest');
      btn.innerHTML = `▶ <span id="stdisp_${sid}">${fmtTime(secPerSet)}</span>`;
    }
  }
  if (phase) { phase.textContent = ''; phase.className = 'serie-phase'; }
}

// startSerieTimer : timer pour les exercices en durée (isDurationEx).
// Phases : 'prep' (décompte 3 s avec bip à chaque seconde) → 'work' (décompte
// avec bips mi-temps/fin) → 'rest' (décompte repos en or) → auto-clic série suivante.
// Affiche en parallèle une modale plein écran avec les contrôles pause/skip/reset.
function startSerieTimer(sid, secPerSet, restSec, serieIdx, totalSets) {
  const btn = document.getElementById('stbtn_'+sid);
  const phase = document.getElementById('sphase_'+sid);
  if (!btn) return;

  // Stop si déjà en cours → reset complet (modale incluse)
  if (serieTimers[sid] && serieTimers[sid].interval) {
    resetSerieTimer(sid);
    if (modalState.sid === sid) closeTimerModal();
    return;
  }

  openTimerModal(sid);

  serieTimers[sid] = {
    interval: null,
    remaining: PREP_SECS,
    phase: 'prep',
    paused: false,
    secPerSet, restSec, serieIdx, totalSets
  };
  btn.classList.add('running');
  if (phase) { phase.textContent = 'Préparation…'; phase.className = 'serie-phase active-phase'; }
  updateTimerModal(sid, 'prep', PREP_SECS);
  beepStart();

  serieTimers[sid].interval = setInterval(() => tickSerieTimer(sid), 1000);
}

function tickSerieTimer(sid) {
  const st = serieTimers[sid];
  if (!st || st.paused) return;

  if (st.phase === 'prep') {
    st.remaining--;
    if (st.remaining > 0) {
      updateTimerModal(sid, 'prep', st.remaining);
      beepStart();
    } else {
      transitionToWork(sid);
    }
    return;
  }

  if (st.phase === 'work') {
    st.remaining--;
    const d = document.getElementById('stdisp_'+sid);
    if (d) d.textContent = fmtTime(Math.max(0, st.remaining));
    updateTimerModal(sid, 'work', st.remaining);
    if (st.remaining === Math.floor(st.secPerSet / 2)) beepHalf();
    if (st.remaining <= 0) finishWorkPhase(sid);
    return;
  }

  if (st.phase === 'rest') {
    st.remaining--;
    const d = document.getElementById('stdisp_'+sid);
    if (d) d.textContent = fmtTime(Math.max(0, st.remaining));
    updateTimerModal(sid, 'rest', st.remaining);
    if (st.remaining <= 0) finishRestPhase(sid);
    return;
  }
}

function transitionToWork(sid) {
  const st = serieTimers[sid];
  if (!st) return;
  st.phase = 'work';
  st.remaining = st.secPerSet;
  const disp = document.getElementById('stdisp_'+sid);
  if (disp) disp.textContent = fmtTime(st.secPerSet);
  const phase = document.getElementById('sphase_'+sid);
  if (phase) { phase.textContent = 'En cours…'; phase.className = 'serie-phase active-phase'; }
  updateTimerModal(sid, 'work', st.secPerSet);
  beepEnd();
}

function finishWorkPhase(sid) {
  const st = serieTimers[sid];
  if (!st) return;
  const isLastSerie = (st.serieIdx === st.totalSets - 1);
  if (!isLastSerie) beepEnd();
  const btn = document.getElementById('stbtn_'+sid);
  const phase = document.getElementById('sphase_'+sid);
  const chk = document.getElementById('schk_'+sid);
  if (chk && !chk.classList.contains('done')) {
    chk.classList.add('done'); chk.textContent = '✓';
  }
  if (isLastSerie) {
    clearInterval(st.interval);
    serieTimers[sid] = null;
    if (btn) btn.classList.remove('running');
    if (phase) { phase.textContent = 'Terminé !'; phase.className = 'serie-phase active-phase'; }
    if (chk) syncExValidation(chk);
    playExerciseCompleteSound(chk);
    closeTimerModal();
    if (btn) {
      const tracker = btn.closest('.series-tracker');
      if (tracker) {
        const exItem = tracker.closest('.ex-item');
        if (exItem) {
          setTimeout(() => {
            exItem.classList.add('collapsed');
            const next = exItem.nextElementSibling;
            if (next && next.classList.contains('ex-item')) next.classList.remove('collapsed');
          }, 800);
        }
      }
    }
    return;
  }
  st.phase = 'rest';
  st.remaining = st.restSec;
  if (btn) {
    btn.classList.remove('running');
    btn.classList.add('rest');
    btn.innerHTML = `⏸ <span id="stdisp_${sid}">${fmtTime(st.restSec)}</span>`;
  }
  if (phase) { phase.textContent = 'Repos…'; phase.className = 'serie-phase'; }
  updateTimerModal(sid, 'rest', st.restSec);
}

function finishRestPhase(sid) {
  const st = serieTimers[sid];
  if (!st) return;
  beepRestEnd();
  const serieIdx = st.serieIdx, totalSets = st.totalSets;
  clearInterval(st.interval);
  serieTimers[sid] = null;
  const pb = document.getElementById('stbtn_'+sid);
  if (pb) {
    pb.classList.remove('rest');
    pb.innerHTML = `✓ <span id="stdisp_${sid}">0:00</span>`;
  }
  const phase = document.getElementById('sphase_'+sid);
  if (phase) { phase.textContent = 'Série suivante !'; phase.className = 'serie-phase active-phase'; }
  closeTimerModal();
  if (serieIdx + 1 < totalSets) {
    const currentBtn = document.getElementById('stbtn_'+sid);
    if (currentBtn) {
      const tracker = currentBtn.closest('.series-tracker');
      if (tracker) {
        const allBtns = tracker.querySelectorAll('.serie-timer-btn');
        if (allBtns[serieIdx + 1]) allBtns[serieIdx + 1].click();
      }
    }
  }
}

function getSessionIdForEx(dayId, exId) {
  const sessions = getSessionsForDay(dayId);
  if (!sessions) return null;
  for (const s of sessions) {
    if (s.exercises && s.exercises.some(ex => ex.id === exId)) return s.id;
  }
  return null;
}

// syncExValidation : maintient la cohérence séries ↔ exercice dans les deux sens.
// Appelée après chaque changement d'une case série (repSerieCheck, toggleSerieCheck, startSerieTimer).
// - Toutes les série-check "done" → marque l'exercice checked, sauvegarde, rafraîchit badge/onglet/overview.
// - Au moins une série décochée → démarque l'exercice si il était checked.
function syncExValidation(chk) {
  const tracker = chk.closest('.series-tracker');
  if (!tracker) return;
  const dayId = tracker.dataset.day;
  const exId = tracker.dataset.ex;
  if (!dayId || !exId) return;
  const allDone = Array.from(tracker.querySelectorAll('.serie-check')).every(c => c.classList.contains('done'));
  const { checks } = loadData(dayId);
  if (allDone && !checks[exId]) {
    checks[exId] = true;
    saveChecks(dayId, checks);
    const row = document.getElementById('exrow_' + dayId + '_' + exId);
    if (row) { row.classList.add('checked'); row.querySelector('.ex-check').textContent = '✓'; }
    const sessionId = getSessionIdForEx(dayId, exId);
    if (sessionId) updateSessionBadge(dayId, sessionId, checks);
    updateTabCount(dayId);
    renderOverview();
  } else if (!allDone && checks[exId]) {
    checks[exId] = false;
    saveChecks(dayId, checks);
    const row = document.getElementById('exrow_' + dayId + '_' + exId);
    if (row) { row.classList.remove('checked'); row.querySelector('.ex-check').textContent = ''; }
    const sessionId = getSessionIdForEx(dayId, exId);
    if (sessionId) updateSessionBadge(dayId, sessionId, checks);
    updateTabCount(dayId);
    renderOverview();
  }
}

function toggleSerieCheck(sid) {
  const chk = document.getElementById('schk_'+sid);
  if (!chk) return;
  chk.classList.toggle('done');
  chk.textContent = chk.classList.contains('done') ? '✓' : '';
  syncExValidation(chk);
}

// renderSubExoTracker : pour les exercices avec subExos (ex: Sphinx→Enfant).
// Chaque cycle = N postures enchaînées, répété `sets` fois.
// Repos 15 s uniquement après la dernière posture de chaque cycle (pas entre postures).
// Le sid suit le pattern {dayId}_{exId}_s{i}_sub{j}.
function renderSubExoTracker(dayId, ex) {
  const sets = ex.sets || 1;
  const subs = ex.subExos || [];
  let html = `<div class="series-tracker" id="st_${dayId}_${ex.id}" data-day="${dayId}" data-ex="${ex.id}">`;
  for (let i = 0; i < sets; i++) {
    subs.forEach((sub, j) => {
      const sid = `${dayId}_${ex.id}_s${i}_sub${j}`;
      const isLast = (i === sets-1 && j === subs.length-1);
      const restSec = (j === subs.length-1) ? 15 : 0; // repos après fin de cycle uniquement
      const subSec = scaledSubSec(ex, sub);
      html += `<div class="series-row" id="srow_${sid}">
        <div class="serie-check" id="schk_${sid}" onclick="toggleSerieCheck('${sid}')"></div>
        <span class="serie-label">${sub.name} ${i+1}/${sets}</span>
        <button class="serie-timer-btn" id="stbtn_${sid}" onclick="startSerieTimer('${sid}',${subSec},${restSec},${i*subs.length+j},${sets*subs.length})">
          ▶ <span id="stdisp_${sid}">${fmtTime(subSec)}</span>
        </button>
        <span class="serie-phase" id="sphase_${sid}"></span>
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

// ║  ADMIN MODE — Éditeur de configuration       ║
// ╚══════════════════════════════════════════════╝
// Activation : bouton ⚙ dans la topbar → toggleAdminMode() (ajoute body.admin-mode).
// Layout : arbre gauche (jours → sessions → exercices) + éditeur droit (formulaire
//   contextuel selon la sélection). Pas de bouton "Sauvegarder" — chaque saisie
//   appelle saveConfig(LIVE_CONFIG) qui écrit localStorage immédiatement et
//   planifie l'upload Drive (debounce 2 s).
// Fonctionnalités : édition de tous les champs d'un exercice (nom, desc, reps,
//   sec, charge, type, serieInfo, url, subExos, veloStats), CRUD sessions +
//   exercices, réordonnancement ↑↓, duplication, builder reps (mode reps/durée
//   + latéralité + aperçu) avec bascule mode libre, conversion simple↔combiné,
//   export/import JSON, reset vers DEFAULT_CONFIG.

// adminState : état de l'UI admin (hors LIVE_CONFIG).
//   active       → true quand body.admin-mode est posé
//   selected     → { kind:'day'|'session'|'exercise', dayId, sessionId?, exerciseId? }
//   expanded     → Set de clés pour l'arbre (dayId ou dayId+'::'+sessionId)
//   repsFreeMode → true si l'utilisateur a forcé le mode libre sur le builder reps
let adminState = {
  active: false,
  selected: null,
  expanded: new Set()
};

// Bascule entre mode utilisateur et mode admin. À la sortie du mode admin,
// le planning est entièrement re-rendu pour refléter d'éventuelles modifications
// de LIVE_CONFIG (ajout/suppression d'exercices, changements de reps, etc.).
function toggleAdminMode() {
  adminState.active = !adminState.active;
  document.body.classList.toggle('admin-mode', adminState.active);
  const btn = document.getElementById('admin-toggle');
  if (btn) btn.classList.toggle('active', adminState.active);
  if (adminState.active) {
    renderAdminTree();
    renderAdminEditor();
  } else {
    // Re-rendre le planning avec la nouvelle config
    renderAllPanels(); renderTabs(); renderOverview();
  }
}

// ── Helpers données ──
function adminKey(dayId, sessionId) { return sessionId ? dayId + '::' + sessionId : dayId; }

function getSessionsForDayConfig(dayId) {
  const day = LIVE_CONFIG.days.find(d => d.id === dayId);
  if (!day) return [];
  if (day.type === 'weekend') {
    if (!LIVE_CONFIG.sessions.weekend) LIVE_CONFIG.sessions.weekend = { sam:[], dim:[] };
    if (!LIVE_CONFIG.sessions.weekend[dayId]) LIVE_CONFIG.sessions.weekend[dayId] = [];
    return LIVE_CONFIG.sessions.weekend[dayId];
  }
  if (!LIVE_CONFIG.sessions[day.type]) LIVE_CONFIG.sessions[day.type] = [];
  return LIVE_CONFIG.sessions[day.type];
}

function adminFindSession(dayId, sessionId) {
  return getSessionsForDayConfig(dayId).find(s => s.id === sessionId);
}

function adminFindExercise(dayId, sessionId, exerciseId) {
  const s = adminFindSession(dayId, sessionId);
  if (!s || !s.exercises) return null;
  return s.exercises.find(e => e.id === exerciseId);
}

function adminCollectAllExerciseIds() {
  const all = [];
  ['bureau','tele'].forEach(t => (LIVE_CONFIG.sessions[t]||[]).forEach(s => (s.exercises||[]).forEach(e => all.push(e.id))));
  ['sam','dim'].forEach(d => (LIVE_CONFIG.sessions.weekend && LIVE_CONFIG.sessions.weekend[d]||[]).forEach(s => (s.exercises||[]).forEach(e => all.push(e.id))));
  return all;
}

function adminNewId(prefix, existing) {
  let n = 1;
  while (existing.includes(prefix + n)) n++;
  return prefix + n;
}

function adminEscapeHTML(s) { return String(s==null?'':s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function adminEscapeAttr(s) { return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ── Arbre ──
function isNodeSelected(kind, dayId, sessionId, exerciseId) {
  const s = adminState.selected;
  if (!s || s.kind !== kind || s.dayId !== dayId) return false;
  if (kind === 'session') return s.sessionId === sessionId;
  if (kind === 'exercise') return s.sessionId === sessionId && s.exerciseId === exerciseId;
  return true;
}

function renderAdminTree() {
  const tree = document.getElementById('admin-tree');
  if (!tree) return;
  let html = '';
  LIVE_CONFIG.days.forEach(day => {
    const dayExpanded = adminState.expanded.has(day.id);
    const daySelected = isNodeSelected('day', day.id) ? 'selected' : '';
    const caret = dayExpanded ? '▾' : '▸';
    html += `<div class="admin-node admin-node-day ${daySelected}" data-kind="day" data-day="${day.id}">
      <span class="admin-node-caret" data-toggle="${day.id}">${caret}</span>
      <span class="admin-node-label">${adminEscapeHTML(day.fullName)}</span>
      <span class="admin-type-badge">${day.type}</span>
    </div>`;
    if (dayExpanded) {
      const sessions = getSessionsForDayConfig(day.id);
      sessions.forEach(s => {
        const key = adminKey(day.id, s.id);
        const sExp = adminState.expanded.has(key);
        const sSel = isNodeSelected('session', day.id, s.id) ? 'selected' : '';
        const sCaret = sExp ? '▾' : '▸';
        html += `<div class="admin-node admin-node-session ${sSel}" data-kind="session" data-day="${day.id}" data-session="${s.id}">
          <span class="admin-node-caret" data-toggle="${key}">${sCaret}</span>
          <span class="admin-node-label">${adminEscapeHTML((s.emoji||'')+' '+(s.title||'(sans titre)'))}</span>
        </div>`;
        if (sExp) {
          (s.exercises||[]).forEach(ex => {
            const exSel = isNodeSelected('exercise', day.id, s.id, ex.id) ? 'selected' : '';
            html += `<div class="admin-node admin-node-exercise ${exSel}" data-kind="exercise" data-day="${day.id}" data-session="${s.id}" data-exercise="${ex.id}">
              <span class="admin-node-caret"></span>
              <span class="admin-node-label">${adminEscapeHTML(ex.name||'(sans nom)')}</span>
            </div>`;
          });
          if (!s.isVelo) {
            html += `<div class="admin-node-add" data-action="add-exercise" data-day="${day.id}" data-session="${s.id}">+ Ajouter un exercice</div>`;
          }
        }
      });
      html += `<div class="admin-node-add" data-action="add-session" data-day="${day.id}">+ Ajouter une session</div>`;
    }
  });
  tree.innerHTML = html;
}

function bindAdminTreeEvents() {
  const tree = document.getElementById('admin-tree');
  if (!tree) return;
  tree.addEventListener('click', (ev) => {
    const toggleEl = ev.target.closest('[data-toggle]');
    if (toggleEl) {
      ev.stopPropagation();
      const key = toggleEl.getAttribute('data-toggle');
      if (adminState.expanded.has(key)) adminState.expanded.delete(key);
      else adminState.expanded.add(key);
      renderAdminTree();
      return;
    }
    const addEl = ev.target.closest('[data-action]');
    if (addEl) {
      const action = addEl.getAttribute('data-action');
      if (action === 'add-session') adminAddSession(addEl.getAttribute('data-day'));
      else if (action === 'add-exercise') adminAddExercise(addEl.getAttribute('data-day'), addEl.getAttribute('data-session'));
      return;
    }
    const nodeEl = ev.target.closest('.admin-node');
    if (nodeEl) {
      adminSelect(
        nodeEl.getAttribute('data-kind'),
        nodeEl.getAttribute('data-day'),
        nodeEl.getAttribute('data-session'),
        nodeEl.getAttribute('data-exercise')
      );
    }
  });
}

function adminSelect(kind, dayId, sessionId, exerciseId) {
  adminState.selected = { kind, dayId, sessionId, exerciseId };
  adminState.repsFreeMode = false; // reset à chaque navigation
  if (kind === 'session' || kind === 'exercise') adminState.expanded.add(dayId);
  if (kind === 'exercise') adminState.expanded.add(adminKey(dayId, sessionId));
  renderAdminTree();
  renderAdminEditor();
}

        </select>

      <div class="admin-field"><label>Charge</label><input type="text" data-field="charge" value="${adminEscapeAttr(ex.charge||'')}"></div>
    </div>

    <div class="admin-field"><label>Lien fiche technique (url)</label><input type="text" data-field="url" value="${adminEscapeAttr(ex.url||'')}"></div>
    <div class="admin-field">
      ${hasSubExos
        ? `<button class="admin-btn" onclick="adminConvertToSimple()">Reconvertir en exercice simple (supprime subExos)</button>`
        : `<button class="admin-btn" onclick="adminConvertToCombined()">Convertir en exercice combiné (subExos)</button>`
      }

      <button class="admin-btn" onclick="adminDuplicateExercise('${dayId}','${sessionId}','${exerciseId}')">Dupliquer</button>
      <button class="admin-btn danger" onclick="adminDeleteExercise('${dayId}','${sessionId}','${exerciseId}')">Supprimer</button>
    </div>
  `;
}

// ── Reps builder : reps/durée + latéralité + aperçu ──
function parseRepsStructure(reps) {
  if (!reps) return { mode:'reps', sets:3, per:10, lateral:false, free:false };
  const s = String(reps).trim();
  let m = s.match(/^(\d+)\s*[×x]\s*(\d+)\s*s(ec|econdes)?\s*(\/\s*c[oô]t[eé])?$/i);
  if (m) return { mode:'duration', sets:parseInt(m[1],10), per:parseInt(m[2],10), lateral:!!m[4], free:false };
  m = s.match(/^(\d+)\s*[×x]\s*(\d+)\s*(\/\s*c[oô]t[eé])?$/i);
  if (m) return { mode:'reps', sets:parseInt(m[1],10), per:parseInt(m[2],10), lateral:!!m[3], free:false };
  return { mode:'reps', sets:0, per:0, lateral:false, free:true };
}

function buildRepsString(mode, sets, per, lateral) {
  if (!sets || !per) return '';
  const lat = lateral ? ' /côté' : '';
  return mode === 'duration' ? `${sets} × ${per} s${lat}` : `${sets} × ${per}${lat}`;
}

function renderRepsBuilder(ex) {
  const p = parseRepsStructure(ex.reps);
  const free = p.free || adminState.repsFreeMode;
  if (free) {
    return `
      <div class="admin-builder">
        <div class="admin-builder-header">
          <span class="admin-builder-title">Séries & répétitions (mode libre)</span>
          <button class="admin-builder-toggle" onclick="adminToggleRepsFree(false)">Revenir au builder</button>
        </div>
        <div class="admin-field-row">
          <div class="admin-field"><label>Reps (texte libre)</label><input type="text" data-field="reps" value="${adminEscapeAttr(ex.reps||'')}"></div>
          <div class="admin-field"><label>Durée totale (sec)</label><input type="text" data-field="sec" value="${ex.sec||0}"></div>
        </div>
        <div class="admin-hint">Utilise le mode libre pour les formats non standard (ex: "10 souffles", "10 × chaque sens").</div>
      </div>
    `;
  }
  const preview = buildRepsString(p.mode, p.sets, p.per, p.lateral) || '(vide)';
  const secCalc = p.mode === 'duration' ? p.sets * p.per * (p.lateral ? 2 : 1) : (ex.sec || 0);
  return `
    <div class="admin-builder">
      <div class="admin-builder-header">
        <span class="admin-builder-title">Séries & répétitions</span>
        <button class="admin-builder-toggle" onclick="adminToggleRepsFree(true)">Forcer valeur libre</button>
      </div>
      <div class="admin-builder-modes">
        <label><input type="radio" name="rb-mode" value="reps" ${p.mode==='reps'?'checked':''}> Reps</label>
        <label><input type="radio" name="rb-mode" value="duration" ${p.mode==='duration'?'checked':''}> Durée</label>
      </div>
      <div class="admin-field-row">
        <div class="admin-field"><label>Séries (sets)</label><input id="rb-sets" type="number" min="1" value="${p.sets||3}"></div>
        <div class="admin-field"><label>Par série <span id="rb-unit">${p.mode==='duration'?'(secondes)':'(répétitions)'}</span></label><input id="rb-per" type="number" min="0" value="${p.per||10}"></div>
      </div>
      <div class="admin-field-checks" style="margin-bottom:8px">
        <label><input id="rb-lat" type="checkbox" ${p.lateral?'checked':''}> Latéralité /côté (double la durée totale)</label>
      </div>
      ${p.mode==='reps' ? `<div class="admin-field"><label>Durée totale estimée (sec)</label><input type="text" data-field="sec" value="${ex.sec||0}"></div>` : ''}
      <div class="admin-builder-preview">
        <span>reps → <code id="rb-preview">${adminEscapeHTML(preview)}</code></span>
        <span>sec → <code id="rb-sec">${secCalc}</code></span>
      </div>
    </div>
  `;
}

function adminToggleRepsFree(v) {
  adminState.repsFreeMode = !!v;
  renderAdminEditor();
}

// ── SubExos (exercices combinés comme Sphinx→Enfant) ──
function renderSubExosEditor(ex) {
  const subs = ex.subExos || [];
  const sets = ex.sets || 3;
  let rows = '';
  subs.forEach((sub, i) => {
    rows += `<div class="admin-subexo-row">
      <input type="text" data-sub-idx="${i}" data-sub-field="name" value="${adminEscapeAttr(sub.name||'')}" placeholder="Nom de la posture">
      <input type="number" min="0" data-sub-idx="${i}" data-sub-field="sec" value="${sub.sec||0}">
      <div class="admin-subexo-actions">
        <button class="admin-btn admin-btn-icon" onclick="adminSubExoMove(${i},-1)" title="Monter">↑</button>
        <button class="admin-btn admin-btn-icon" onclick="adminSubExoMove(${i},1)" title="Descendre">↓</button>
        <button class="admin-btn admin-btn-icon danger" onclick="adminSubExoDelete(${i})" title="Supprimer">×</button>
      </div>
    </div>`;
  });
  return `
    <div class="admin-subexos">
      <div class="admin-builder-header">
        <span class="admin-builder-title">Sous-exercices (postures alternées)</span>
        <button class="admin-builder-toggle" onclick="adminSubExoAdd()">+ Ajouter</button>
      </div>
      <div class="admin-field-row">
        <div class="admin-field"><label>Cycles complets (sets)</label><input type="number" min="1" data-field="sets" value="${sets}"></div>
        <div></div>
      </div>
      ${rows || '<div class="admin-hint">Aucune posture. Ajoute au moins deux postures.</div>'}
      <div class="admin-hint">Règle : 15 s de repos entre chaque cycle complet ; 0 s entre postures d'un même cycle.</div>
    </div>

}

function adminSubExoAdd() {
  const s = adminState.selected;
  if (!s || s.kind !== 'exercise') return;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex) return;
  if (!ex.subExos) ex.subExos = [];
  ex.subExos.push({ name:'Posture', sec:15 });
  if (!ex.sets) ex.sets = 3;
  saveConfig(LIVE_CONFIG);
  renderAdminEditor();
}

function adminSubExoDelete(idx) {
  if (!confirm('Supprimer cette posture ?')) return;
  const s = adminState.selected;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex || !ex.subExos) return;
  ex.subExos.splice(idx, 1);
  saveConfig(LIVE_CONFIG);
  renderAdminEditor();
}

function adminSubExoMove(idx, delta) {
  const s = adminState.selected;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex || !ex.subExos) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= ex.subExos.length) return;
  [ex.subExos[idx], ex.subExos[newIdx]] = [ex.subExos[newIdx], ex.subExos[idx]];
  saveConfig(LIVE_CONFIG);
  renderAdminEditor();
}

function adminConvertToCombined() {
  const s = adminState.selected;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex) return;
  ex.subExos = [ { name:'Posture 1', sec:15 }, { name:'Posture 2', sec:15 } ];
  if (!ex.sets) ex.sets = 3;
  saveConfig(LIVE_CONFIG);
  renderAdminEditor();
}

function adminConvertToSimple() {
  if (!confirm('Supprimer les subExos et revenir à un exercice simple ?')) return;
  const s = adminState.selected;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex) return;
  delete ex.subExos;
  delete ex.sets;
  saveConfig(LIVE_CONFIG);
  renderAdminEditor();
}

function bindAdminEditorEvents() {
  const editor = document.getElementById('admin-editor');
  if (!editor) return;
  // input : mutation live (texte / textarea / number)
  editor.addEventListener('input', (ev) => {
    // 1) SubExo inputs (name/sec)
    const subEl = ev.target.closest('[data-sub-field]');
    if (subEl) {
      const idx = parseInt(subEl.getAttribute('data-sub-idx'),10);
      const field = subEl.getAttribute('data-sub-field');
      adminSubExoUpdate(idx, field, subEl.value);
      return;
    }
    // 2) Reps builder inputs (id-based)
    if (ev.target.id === 'rb-sets' || ev.target.id === 'rb-per' || ev.target.id === 'rb-lat') {
      repsBuilderRecompute();
      return;
    }
    // 3) Champs classiques data-field
    const el = ev.target.closest('[data-field]');
    if (!el) return;
    const field = el.getAttribute('data-field');
    const value = el.type === 'checkbox' ? el.checked : (el.value ?? '');
    adminApplyFieldEdit(field, value);
  });
  editor.addEventListener('change', (ev) => {
    // Changement du mode du reps builder → recompute et re-render (pour l'unité affichée + durée/reps)
    if (ev.target.name === 'rb-mode') {
      repsBuilderRecompute();
      renderAdminEditor();
      return;
    }
    const el = ev.target.closest('[data-field]');
    if (el) {
      const field = el.getAttribute('data-field');
      // Re-render éditeur si un champ modifie la structure conditionnelle affichée
      if (field === 'isVelo' || field === 'type') { renderAdminEditor(); }
    }
    renderAdminTree();
  });
}

function repsBuilderRecompute() {
  const s = adminState.selected;
  if (!s || s.kind !== 'exercise') return;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex) return;
  const modeEl = document.querySelector('#admin-editor input[name="rb-mode"]:checked');
  const setsEl = document.getElementById('rb-sets');
  const perEl = document.getElementById('rb-per');
  const latEl = document.getElementById('rb-lat');
  if (!modeEl || !setsEl || !perEl) return;
  const mode = modeEl.value;
  const sets = parseInt(setsEl.value,10) || 0;
  const per = parseInt(perEl.value,10) || 0;
  const lat = !!(latEl && latEl.checked);
  ex.reps = buildRepsString(mode, sets, per, lat);
  if (mode === 'duration') ex.sec = sets * per * (lat ? 2 : 1);
  const prev = document.getElementById('rb-preview');
  const secLbl = document.getElementById('rb-sec');
  const unit = document.getElementById('rb-unit');
  if (prev) prev.textContent = ex.reps || '(vide)';
  if (secLbl) secLbl.textContent = ex.sec || 0;
  if (unit) unit.textContent = mode === 'duration' ? '(secondes)' : '(répétitions)';
  saveConfig(LIVE_CONFIG);
}

function adminSubExoUpdate(idx, field, value) {
  const s = adminState.selected;
  if (!s || s.kind !== 'exercise') return;
  const ex = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!ex || !ex.subExos || !ex.subExos[idx]) return;
  if (field === 'sec') {
    const n = parseInt(value,10);
    ex.subExos[idx].sec = isNaN(n) ? 0 : n;
  } else {
    ex.subExos[idx][field] = value;
  }
  saveConfig(LIVE_CONFIG);
}

// Point d'entrée unique des éditions de champs "classiques" (data-field).
// Aiguille sur la bonne cible (day / session / exercise) via adminState.selected,
// gère les chemins pointés ("veloStats.km"), les conversions num (sec/sets) et les
// flags booléens (isVelo → initialise veloStats/veloDir et retire exercises).
function adminApplyFieldEdit(field, value) {
  const s = adminState.selected;
  if (!s) return;
  let target = null;
  if (s.kind === 'day') target = LIVE_CONFIG.days.find(d => d.id === s.dayId);
  else if (s.kind === 'session') target = adminFindSession(s.dayId, s.sessionId);
  else if (s.kind === 'exercise') target = adminFindExercise(s.dayId, s.sessionId, s.exerciseId);
  if (!target) return;
  // Chemin pointé : ex. "veloStats.km"
  if (field.includes('.')) {
    const [root, sub] = field.split('.');
    if (!target[root]) target[root] = {};
    target[root][sub] = value;
  } else if (field === 'sec' || field === 'sets') {
    const n = parseInt(value, 10);
    target[field] = isNaN(n) ? 0 : n;
  } else if (field === 'isVelo' || field === 'isMuscu' || field === 'isYoga') {
    if (value) {
      target[field] = true;
      if (field === 'isVelo') {
        if (!target.veloStats) target.veloStats = { km:10, duree:'~30 min', cal:'~220 kcal', difficulte:'Modéré' };
        if (!target.veloDir) target.veloDir = 'aller';
        if (target.exercises) delete target.exercises; // une session vélo n'a pas d'exercices
      }
    } else {
      delete target[field];
    }
  } else {
    target[field] = value;
  }
  if (s.kind === 'day' && field === 'type') ensureSessionsArrayForDay(s.dayId);
  saveConfig(LIVE_CONFIG);
}

// Appelée après un changement du `type` d'un jour (ex: bureau → weekend) :
// garantit l'existence du bucket sessions correspondant dans LIVE_CONFIG pour
// que le jour édité puisse recevoir des sessions.
function ensureSessionsArrayForDay(dayId) {
  const day = LIVE_CONFIG.days.find(d => d.id === dayId);
  if (!day) return;
  if (day.type === 'weekend') {
    if (!LIVE_CONFIG.sessions.weekend) LIVE_CONFIG.sessions.weekend = { sam:[], dim:[] };
    if (!LIVE_CONFIG.sessions.weekend[dayId]) LIVE_CONFIG.sessions.weekend[dayId] = [];
  } else if (!LIVE_CONFIG.sessions[day.type]) {
    LIVE_CONFIG.sessions[day.type] = [];
  }
}

// ── CRUD ──
function adminAddSession(dayId) {
  const sessions = getSessionsForDayConfig(dayId);
  const id = adminNewId('session_', sessions.map(s => s.id));
  sessions.push({ id, emoji:'✨', title:'Nouvelle session', desc:'', duration:'', exercises:[] });
  saveConfig(LIVE_CONFIG);
  adminState.expanded.add(dayId);
  adminSelect('session', dayId, id);
}

function adminAddExercise(dayId, sessionId) {
  const session = adminFindSession(dayId, sessionId);
  if (!session) return;
  if (!session.exercises) session.exercises = [];
  const id = adminNewId('exo_', adminCollectAllExerciseIds());
  session.exercises.push({ id, name:'Nouvel exercice', desc:'', reps:'3 × 10', sec:0, type:'gainage' });
  saveConfig(LIVE_CONFIG);
  adminState.expanded.add(adminKey(dayId, sessionId));
  adminSelect('exercise', dayId, sessionId, id);
}

function adminMoveSession(dayId, sessionId, delta) {
  const sessions = getSessionsForDayConfig(dayId);
  const idx = sessions.findIndex(s => s.id === sessionId);
  const newIdx = idx + delta;
  if (idx < 0 || newIdx < 0 || newIdx >= sessions.length) return;
  [sessions[idx], sessions[newIdx]] = [sessions[newIdx], sessions[idx]];
  saveConfig(LIVE_CONFIG);
  renderAdminTree();
}

function adminMoveExercise(dayId, sessionId, exerciseId, delta) {
  const session = adminFindSession(dayId, sessionId);
  if (!session || !session.exercises) return;
  const idx = session.exercises.findIndex(e => e.id === exerciseId);
  const newIdx = idx + delta;
  if (idx < 0 || newIdx < 0 || newIdx >= session.exercises.length) return;
  [session.exercises[idx], session.exercises[newIdx]] = [session.exercises[newIdx], session.exercises[idx]];
  saveConfig(LIVE_CONFIG);
  renderAdminTree();
}

function adminDuplicateSession(dayId, sessionId) {
  const sessions = getSessionsForDayConfig(dayId);
  const idx = sessions.findIndex(s => s.id === sessionId);
  if (idx < 0) return;
  const clone = JSON.parse(JSON.stringify(sessions[idx]));
  clone.id = adminNewId('session_', sessions.map(s => s.id));
  clone.title = (clone.title||'') + ' (copie)';
  const allIds = adminCollectAllExerciseIds();
  (clone.exercises||[]).forEach(e => {
    const newId = adminNewId('exo_', allIds);
    allIds.push(newId);
    e.id = newId;
  });
  sessions.splice(idx+1, 0, clone);
  saveConfig(LIVE_CONFIG);
  adminSelect('session', dayId, clone.id);
}

function adminDuplicateExercise(dayId, sessionId, exerciseId) {
  const session = adminFindSession(dayId, sessionId);
  if (!session || !session.exercises) return;
  const idx = session.exercises.findIndex(e => e.id === exerciseId);
  if (idx < 0) return;
  const clone = JSON.parse(JSON.stringify(session.exercises[idx]));
  clone.id = adminNewId('exo_', adminCollectAllExerciseIds());
  clone.name = (clone.name||'') + ' (copie)';
  session.exercises.splice(idx+1, 0, clone);
  saveConfig(LIVE_CONFIG);
  adminSelect('exercise', dayId, sessionId, clone.id);
}

function adminDeleteSession(dayId, sessionId) {
  if (!confirm('Supprimer cette session et tous ses exercices ?')) return;
  const sessions = getSessionsForDayConfig(dayId);
  const idx = sessions.findIndex(s => s.id === sessionId);
  if (idx < 0) return;
  sessions.splice(idx, 1);
  saveConfig(LIVE_CONFIG);
  adminState.selected = { kind:'day', dayId };
  renderAdminTree();
  renderAdminEditor();
}

function adminDeleteExercise(dayId, sessionId, exerciseId) {
  if (!confirm('Supprimer cet exercice ?')) return;
  const session = adminFindSession(dayId, sessionId);
  if (!session || !session.exercises) return;
  const idx = session.exercises.findIndex(e => e.id === exerciseId);
  if (idx < 0) return;
  session.exercises.splice(idx, 1);
  saveConfig(LIVE_CONFIG);
  adminState.selected = { kind:'session', dayId, sessionId };
  renderAdminTree();
  renderAdminEditor();
}

// ── Export / Import / Reset ──
// Rafraîchit tout le rendu non-admin après un remplacement total de LIVE_CONFIG.
function adminReRenderAll() {
  renderAdminTree();
  renderAdminEditor();
  renderAllPanels();
  renderTabs();
  renderOverview();
}

function adminExportConfig() {
  try {
    if (LIVE_CONFIG && LIVE_CONFIG.meta) LIVE_CONFIG.meta.lastModified = new Date().toISOString();
    const payload = JSON.stringify(LIVE_CONFIG, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0,19);
    a.href = url;
    a.download = `fitness_programme_config_${ts}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 500);
  } catch (e) {
    alert('Export impossible : ' + (e && e.message ? e.message : e));
  }
}

function adminImportConfig(event) {
  const file = event && event.target && event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!isValidConfig(parsed)) {
        alert('Fichier invalide : structure non reconnue (version, days[7], sessions.bureau/tele/weekend requis).');
        return;
      }
      if (!confirm('Remplacer la configuration actuelle par ce fichier ?\n(La progression hebdomadaire n\'est pas affectée.)')) {
        return;
      }
      if (!parsed.meta) parsed.meta = {};
      parsed.meta.lastModified = new Date().toISOString();
      parsed.meta.source = 'import';
      LIVE_CONFIG = parsed;
      saveConfig(LIVE_CONFIG, 'import');
      adminState.selected = null;
      adminState.expanded = new Set();
      adminReRenderAll();
    } catch (e) {
      alert('Lecture impossible : ' + (e && e.message ? e.message : e));
    } finally {
      // Reset l'input pour autoriser ré-import du même fichier
      if (event && event.target) event.target.value = '';
    }
  };
  reader.onerror = () => alert('Erreur de lecture du fichier.');
  reader.readAsText(file);
}

function adminResetConfig() {
  if (!confirm('Restaurer la configuration par défaut ?\nTous les jours, sessions et exercices personnalisés seront perdus.\n(La progression hebdomadaire n\'est pas affectée.)')) {
    return;
  }
  LIVE_CONFIG = cloneDefaultConfig();
  saveConfig(LIVE_CONFIG, 'default');
  adminState.selected = null;
  adminState.expanded = new Set();
  adminReRenderAll();
}

// ╔══════════════════════════════════════════════╗
// ║  INIT — Point d'entrée                       ║
// ╚══════════════════════════════════════════════╝
// Ordre d'exécution au boot :
//   1. loadConfig() — hydrate LIVE_CONFIG depuis localStorage (ou DEFAULT_CONFIG).
//      DOIT précéder tout rendu : tout le rendu lit LIVE_CONFIG.
//   2. Détection du jour courant (getDay() → index LIVE_CONFIG.days via dayMap :
//      JS Sunday=0 → index 6 (dim), Monday=1 → 0 (lun), etc.).
//   3. Rendu de l'UI (panneaux, onglets, overview) + bind des events admin.
//   4. Différé 800 ms : tryRestoreToken() — laisse la lib Google (gsi/client)
//      finir son chargement ; si un token valide existe en localStorage,
//      loadFromDrive() peut écraser LIVE_CONFIG (config Drive prioritaire) et
//      fusionner la progression.
//   5. Wake Lock : demande l'empêchement de la mise en veille, re-demandé à
//      chaque retour de visibilité (onglet réactivé).

(function init() {
  loadConfig(); // Doit précéder tout rendu : LIVE_CONFIG est la source de vérité.
  EXERCISE_SCALES = loadScales(); // Scales utilisateur — lus avant tout rendu (helpers scaled*).
  const jsDay = new Date().getDay(); // 0=dim, 1=lun...
  const dayMap = [6,0,1,2,3,4,5]; // JS Sunday=0 → LIVE_CONFIG.days index 6 (dim), Monday=1 → 0 (lun)...
  activeDay = LIVE_CONFIG.days[dayMap[jsDay] ?? 0].id;
  updateWeekDisplay();
  renderAllPanels();
  renderTabs();
  renderOverview();
  bindAdminTreeEvents();
  bindAdminEditorEvents();
  setTimeout(tryRestoreToken, 800);

  // Wake Lock — empêche la mise en veille de l'écran
  let wakeLock = null;
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch {}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
  requestWakeLock();
})();
</script>
</body>
